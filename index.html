<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八字排盘 - 四柱八字在线测算</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>八字排盘</h1>
      <p>四柱八字 · 五行推演 · 命理分析</p>
    </header>

    <div class="form-section">
      <h2>◆ 请输入出生信息</h2>
      <form id="baziForm" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label>年</label>
            <select id="birthYear"></select>
          </div>
          <div class="form-group">
            <label>月</label>
            <select id="birthMonth">
              <option value="1">1 月</option><option value="2">2 月</option>
              <option value="3">3 月</option><option value="4">4 月</option>
              <option value="5">5 月</option><option value="6">6 月</option>
              <option value="7">7 月</option><option value="8">8 月</option>
              <option value="9">9 月</option><option value="10">10 月</option>
              <option value="11">11 月</option><option value="12">12 月</option>
            </select>
          </div>
          <div class="form-group">
            <label>日</label>
            <select id="birthDay"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>时辰</label>
            <select id="birthHour">
              <option value="0">子时 (23:00-00:59)</option>
              <option value="1">丑时 (01:00-02:59)</option>
              <option value="2">寅时 (03:00-04:59)</option>
              <option value="3">卯时 (05:00-06:59)</option>
              <option value="4">辰时 (07:00-08:59)</option>
              <option value="5">巳时 (09:00-10:59)</option>
              <option value="6" selected>午时 (11:00-12:59)</option>
              <option value="7">未时 (13:00-14:59)</option>
              <option value="8">申时 (15:00-16:59)</option>
              <option value="9">酉时 (17:00-18:59)</option>
              <option value="10">戌时 (19:00-20:59)</option>
              <option value="11">亥时 (21:00-22:59)</option>
            </select>
          </div>
          <div class="form-group">
            <label>性别</label>
            <select id="birthGender">
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-submit">开 始 排 盘</button>
      </form>
    </div>

    <div class="result-section" id="resultSection">
      <!-- ── Sticky Top Banner ── -->
      <div class="result-sticky" id="resultSticky">
        <div class="compact-bazi">
          <div class="compact-pillars" id="compactPillars"></div>
          <div class="compact-meta" id="compactMeta"></div>
        </div>
      </div>

      <div class="form-section" style="padding-top:4px">
        <!-- ── Full-size Pillar Cards ── -->
        <h2>◆ 四柱八字</h2>
        <div class="pillars-grid" id="pillarsGrid"></div>

        <div class="info-grid">
          <div class="info-card full-width" id="riGanCard">
            <h3>◆ 日主</h3>
            <div style="text-align:center;padding:8px 0">
              <span class="gan-day-master" id="riGanDisplay"></span>
              <div style="color:#b89a6a;font-size:0.85rem;margin-top:4px" id="riGanDesc"></div>
            </div>
          </div>

          <div class="info-card">
            <h3>◆ 命主信息</h3>
            <div class="info-row"><span class="info-label">生肖</span><span class="info-value" id="shengXiao"></span></div>
            <div class="info-row"><span class="info-label">性别</span><span class="info-value" id="genderDisplay"></span></div>
            <div class="info-row"><span class="info-label">日干五行</span><span class="info-value" id="riWxDisplay"></span></div>
            <div class="info-row"><span class="info-label">日支藏干</span><span class="info-value" id="cangGanDisplay"></span></div>
          </div>

          <div class="info-card">
            <h3>◆ 十神</h3>
            <div class="info-row"><span class="info-label">年柱</span><span class="info-value" id="ssYear"></span></div>
            <div class="info-row"><span class="info-label">月柱</span><span class="info-value" id="ssMonth"></span></div>
            <div class="info-row"><span class="info-label">日柱</span><span class="info-value" id="ssDay">日主</span></div>
            <div class="info-row"><span class="info-label">时柱</span><span class="info-value" id="ssHour"></span></div>
          </div>

          <div class="info-card">
            <h3>◆ 十二长生</h3>
            <div class="info-row"><span class="info-label">年柱</span><span class="info-value" id="csYear"></span></div>
            <div class="info-row"><span class="info-label">月柱</span><span class="info-value" id="csMonth"></span></div>
            <div class="info-row"><span class="info-label">日柱</span><span class="info-value" id="csDay"></span></div>
            <div class="info-row"><span class="info-label">时柱</span><span class="info-value" id="csHour"></span></div>
          </div>

          <div class="info-card">
            <h3>◆ 纳音五行</h3>
            <div class="info-row"><span class="info-label">年柱</span><span class="info-value" id="nayinYear"></span></div>
            <div class="info-row"><span class="info-label">月柱</span><span class="info-value" id="nayinMonth"></span></div>
            <div class="info-row"><span class="info-label">日柱</span><span class="info-value" id="nayinDay"></span></div>
            <div class="info-row"><span class="info-label">时柱</span><span class="info-value" id="nayinHour"></span></div>
          </div>

          <div class="info-card full-width">
            <h3>◆ 五行分布</h3>
            <div class="wuxing-bar" id="wuxingBar"></div>
            <div class="wuxing-bar-total" id="wuxingTags"></div>
          </div>

          <div class="info-card full-width" id="shenshaCard">
            <h3>◆ 神煞</h3>
            <div class="shensha-grid" id="shenshaGrid"></div>
          </div>

          <div class="info-card full-width" id="dayunCard">
            <h3>◆ 大运排布 <span style="color:#5a4a3a;font-weight:400;font-size:0.72rem">（点击大运行查看流年）</span></h3>
            <div id="dayunInfo" style="margin-bottom:12px;font-size:0.88rem;color:#b89a6a"></div>
            <div class="dayun-table-wrap">
              <table class="dayun-table" id="dayunTable"></table>
            </div>
          </div>

          <div class="info-card full-width" id="flowDetailSection" style="display:none">
            <h3>◆ 流年详情 <span style="color:#5a4a3a;font-weight:400;font-size:0.72rem" id="flowYearLabel"></span></h3>
            <div id="flowDetailContent"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">仅供学习参考 · 传统文化研究</div>
  </div>

  <script src="js/bazi.js"></script>
  <script>
    let lastResult = null;
    let activeFlowYear = null;
    let originalShenshaHTML = '';

    const defaultDate = getDefaultDate();

    (function initForm() {
      const yearSel = document.getElementById('birthYear');
      for (let y = 1900; y <= 2100; y++) {
        const opt = document.createElement('option');
        opt.value = y; opt.textContent = y + ' 年';
        if (y === defaultDate.year) opt.selected = true;
        yearSel.appendChild(opt);
      }
      document.getElementById('birthMonth').value = defaultDate.month;
      const daySel = document.getElementById('birthDay');
      for (let d = 1; d <= 31; d++) {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d + ' 日';
        if (d === defaultDate.day) opt.selected = true;
        daySel.appendChild(opt);
      }
      const h = getHourBranchIdx(defaultDate.hour, defaultDate.minute);
      document.getElementById('birthHour').value = h;
    })();

    document.getElementById('baziForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const year = parseInt(document.getElementById('birthYear').value);
      const month = parseInt(document.getElementById('birthMonth').value);
      const day = parseInt(document.getElementById('birthDay').value);
      const hourBranch = parseInt(document.getElementById('birthHour').value);
      const gender = document.getElementById('birthGender').value;
      const hourMap = { 0:[23,0],1:[1,0],2:[3,0],3:[5,0],4:[7,0],5:[9,0],6:[11,0],7:[13,0],8:[15,0],9:[17,0],10:[19,0],11:[21,0] };
      const [hour, minute] = hourMap[hourBranch];
      const result = calcBazi(year, month, day, hour, minute, gender);
      lastResult = result;
      activeFlowYear = null;
      displayResult(result);
    });

    function getNianZhiIndex(year,month,day){
      const md=month*100+day;
      let y=md<204?year-1:year;
      return ((y-4)%12+12)%12;
    }

    function displayResult(r) {
      // Compact sticky header
      const cp = document.getElementById('compactPillars');
      cp.innerHTML = '';
      r.pillars.forEach(p => {
        const wxG = WU_XING_TG[p.gan], wxZ = WU_XING_DZ[p.zhi];
        const div = document.createElement('div');
        div.className = 'compact-pillar';
        div.innerHTML = `
          <div class="cp-name">${p.name}</div>
          <div class="cp-gan" style="color:${WU_XING_COLOR[wxG]}">${p.gan}</div>
          <div class="cp-zhi" style="color:${WU_XING_COLOR[wxZ]}">${p.zhi}</div>
        `;
        cp.appendChild(div);
      });
      document.getElementById('compactMeta').innerHTML =
        `<span>日主：<strong>${r.riGan} · ${r.riWx} · ${r.riYinYang}</strong></span>` +
        `<span>生肖：<strong>${r.shengXiao}</strong></span>` +
        `<span>${r.gender}</span>`;

      // Pillar cards
      const grid = document.getElementById('pillarsGrid');
      grid.innerHTML = '';
      r.pillars.forEach((p, i) => {
        const wxG = WU_XING_TG[p.gan], wxZ = WU_XING_DZ[p.zhi];
        const card = document.createElement('div');
        card.className = 'pillar-card';
        card.innerHTML = `
          <div class="pillar-name">${p.name}</div>
          <div class="pillar-gan">${p.gan}</div>
          <div class="pillar-zhi">${p.zhi}</div>
          <div>
            <span class="pillar-wx" style="background:${WU_XING_COLOR[wxG]}">${wxG}</span>
            <span class="pillar-wx" style="background:${WU_XING_COLOR[wxZ]}">${wxZ}</span>
          </div>
          <div class="pillar-nayin">${r.nayin[i]}</div>
          <div class="pillar-detail">
            <span>${r.yinyang[i].gan}</span>·<span>${r.yinyang[i].zhi}</span>
          </div>
          <div class="pillar-changsheng">${r.changSheng[i]}</div>
        `;
        grid.appendChild(card);
      });

      document.getElementById('riGanDisplay').textContent = r.riGan + ' (' + r.riWx + ' · ' + r.riYinYang + ')';
      document.getElementById('riGanDesc').textContent = `日主为${r.riYinYang}${r.riWx} · 生于${r.riZhi}日 · ${r.hourRange}出生`;

      document.getElementById('shengXiao').textContent = r.shengXiao;
      document.getElementById('genderDisplay').textContent = r.gender;
      document.getElementById('riWxDisplay').textContent = r.riWx;
      document.getElementById('cangGanDisplay').textContent = r.cangGan[2].join('、');

      document.getElementById('ssYear').textContent = r.shiShen[0];
      document.getElementById('ssMonth').textContent = r.shiShen[1];
      document.getElementById('ssDay').textContent = '日主';
      document.getElementById('ssHour').textContent = r.shiShen[3];

      document.getElementById('csYear').textContent = r.changSheng[0];
      document.getElementById('csMonth').textContent = r.changSheng[1];
      document.getElementById('csDay').textContent = r.changSheng[2];
      document.getElementById('csHour').textContent = r.changSheng[3];

      document.getElementById('nayinYear').textContent = r.nayin[0];
      document.getElementById('nayinMonth').textContent = r.nayin[1];
      document.getElementById('nayinDay').textContent = r.nayin[2];
      document.getElementById('nayinHour').textContent = r.nayin[3];

      // 五行
      const bar = document.getElementById('wuxingBar');
      bar.innerHTML = '';
      const wxOrder = ['木','火','土','金','水'];
      wxOrder.forEach(wx => {
        if (r.wuxingCount[wx] > 0) {
          const seg = document.createElement('div');
          seg.className = 'wuxing-bar-seg';
          const pct = r.wuxingPercent[wx];
          seg.style.width = pct + '%';
          seg.style.background = WU_XING_COLOR[wx];
          seg.textContent = pct >= 10 ? wx : '';
          bar.appendChild(seg);
        }
      });

      const tags = document.getElementById('wuxingTags');
      tags.innerHTML = '';
      wxOrder.forEach(wx => {
        const tag = document.createElement('span');
        tag.className = 'wuxing-tag';
        tag.style.background = WU_XING_COLOR[wx] + '33';
        tag.style.color = WU_XING_COLOR[wx];
        tag.innerHTML = `${wx} ${r.wuxingCount[wx]} (${r.wuxingPercent[wx]}%)`;
        tags.appendChild(tag);
      });
      if (r.missingWx.length > 0) {
        const missTag = document.createElement('span');
        missTag.className = 'wuxing-tag';
        missTag.style.background = '#555';
        missTag.style.color = '#ccc';
        missTag.textContent = '缺: ' + r.missingWx.join('、');
        tags.appendChild(missTag);
      }

      // 神煞
      const sg = document.getElementById('shenshaGrid');
      sg.innerHTML = '';
      const entries = Object.entries(r.shenSha);
      if (entries.length === 0) {
        sg.innerHTML = '<div style="color:#a08870;font-size:0.85rem;text-align:center;padding:8px 0">无显著神煞</div>';
      } else {
        entries.forEach(([name, val]) => {
          const div = document.createElement('div');
          div.className = 'shensha-item';
          const vStr = Array.isArray(val) ? val.join('、') : val;
          div.innerHTML = `<span class="shensha-name">${name}</span><span class="shensha-val">${vStr}</span>`;
          sg.appendChild(div);
        });
      }
      originalShenshaHTML = sg.innerHTML;

      // 大运
      const dy = r.daYun;
      document.getElementById('dayunInfo').innerHTML = `起运年龄：<strong>${dy.startAge} 岁</strong> &nbsp;·&nbsp; 排法：<strong>${dy.shunPai ? '顺排' : '逆排'}</strong>`;
      const dt = document.getElementById('dayunTable');
      dt.innerHTML = '';
      const thead = document.createElement('thead');
      thead.innerHTML = '<tr><th>大运</th><th>年龄</th><th>天干</th><th>地支</th><th>五行</th><th>纳音</th></tr>';
      dt.appendChild(thead);
      const tbody = document.createElement('tbody');
      dy.pillars.forEach((p, i) => {
        const tr = document.createElement('tr');
        tr.dataset.dayunIndex = i;
        tr.innerHTML = `
          <td>${p.index}</td>
          <td>${p.ageFrom}-${p.ageTo}岁</td>
          <td style="color:${WU_XING_COLOR[p.wxG]};font-weight:500">${p.gan}</td>
          <td style="color:${WU_XING_COLOR[p.wxZ]};font-weight:500">${p.zhi}</td>
          <td><span class="pillar-wx" style="background:${WU_XING_COLOR[p.wxG]}">${p.wxG}</span><span class="pillar-wx" style="background:${WU_XING_COLOR[p.wxZ]}">${p.wxZ}</span></td>
          <td style="color:#a08870">${p.naYin}</td>
        `;
        tbody.appendChild(tr);
      });
      dt.appendChild(tbody);

      // Hide flow detail
      document.getElementById('flowDetailSection').style.display = 'none';

      // Show result
      document.getElementById('resultSection').classList.add('visible');
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ── 大运 Click: toggle flow years ──
    document.getElementById('dayunTable').addEventListener('click', function(e) {
      const row = e.target.closest('tr[data-dayun-index]');
      if (!row) return;
      if (row.classList.contains('dayun-expand-row')) return;
      const index = parseInt(row.dataset.dayunIndex);
      toggleDayunFlow(index);
    });

    let expandedDayunIdx = -1;

    function toggleDayunFlow(index) {
      // Remove existing expand
      const existing = document.querySelector('.dayun-expand-row');
      if (existing) {
        existing.remove();
        document.querySelectorAll('.dayun-table tbody tr').forEach(tr => tr.classList.remove('dayun-active'));
        if (expandedDayunIdx === index) {
          expandedDayunIdx = -1;
          activeFlowYear = null;
          document.getElementById('flowDetailSection').style.display = 'none';
          // Restore original shensha
          document.getElementById('shenshaGrid').innerHTML = originalShenshaHTML;
          return;
        }
      }

      expandedDayunIdx = index;
      const row = document.querySelector(`.dayun-table tbody tr[data-dayun-index="${index}"]`);
      if (!row) return;
      row.classList.add('dayun-active');

      const dy = lastResult.daYun.pillars[index];
      const birthYear = parseInt(document.getElementById('birthYear').value);
      const startYear = birthYear + dy.ageFrom;

      const expandRow = document.createElement('tr');
      expandRow.className = 'dayun-expand-row';
      expandRow.dataset.dayunIndex = index;

      let yearsHtml = '';
      for (let i = 0; i < 10; i++) {
        const y = startYear + i;
        const ganIdx = ((y - 4) % 10 + 10) % 10;
        const zhiIdx = ((y - 4) % 12 + 12) % 12;
        const isActive = activeFlowYear === y;
        yearsHtml += `<span class="flow-year-chip${isActive ? ' active' : ''}" data-year="${y}">
          <span class="fy-year">${y}</span>
          <span class="fy-ganzhi">${TIAN_GAN[ganIdx]}${DI_ZHI[zhiIdx]}</span>
        </span>`;
      }

      expandRow.innerHTML = `<td colspan="6">
        <div class="dayun-flow-wrap">
          <div style="color:#a08870;font-size:0.72rem;margin-bottom:4px">点击流年查看详情</div>
          <div class="dayun-flow-years">${yearsHtml}</div>
        </div>
      </td>`;
      row.after(expandRow);
    }

    // ── 流年 Chip Click ──
    document.addEventListener('click', function(e) {
      const chip = e.target.closest('.flow-year-chip');
      if (!chip) return;
      const year = parseInt(chip.dataset.year);
      if (!lastResult) return;
      showFlowDetail(year);
    });

    function showFlowDetail(year) {
      activeFlowYear = year;

      // Update active chip
      document.querySelectorAll('.flow-year-chip').forEach(ch => {
        ch.classList.toggle('active', parseInt(ch.dataset.year) === year);
      });

      const r = lastResult;
      const birthY = parseInt(document.getElementById('birthYear').value);
      const birthM = parseInt(document.getElementById('birthMonth').value);
      const birthD = parseInt(document.getElementById('birthDay').value);
      const nianZhi = DI_ZHI[getNianZhiIndex(birthY, birthM, birthD)];
      const lr = calcLiuNian(year, r.riGan, TIAN_GAN.indexOf(r.riGan), r.pillars, nianZhi, r.pillars[1].zhi);

      // Update 神煞 with flow year shensha
      const sg = document.getElementById('shenshaGrid');
      sg.innerHTML = '';
      const shenshaEntries = Object.entries(lr.shenSha);
      if (shenshaEntries.length) {
        const idx = lr.ganIdx !== undefined ? lr.ganIdx : TIAN_GAN.indexOf(lr.gan);
        const guiRen = calcTianYiGuiRen(lr.gan).slice(0,2);
        const wc = calcWenChang(lr.gan);
        const ym = calcYiMa(lr.zhi);
        const th = calcTaoHua(lr.zhi);
        const hg = calcHuaGai(lr.zhi);
        const allShensha = {};
        if (guiRen.length) allShensha['天乙贵人'] = guiRen;
        if (wc) allShensha['文昌贵人'] = wc;
        if (ym) allShensha['驿马'] = ym;
        if (th) allShensha['桃花'] = th;
        if (hg) allShensha['华盖'] = hg;
        mergeObj(allShensha, lr.shenSha);
        Object.entries(allShensha).forEach(([name, val]) => {
          const div = document.createElement('div');
          div.className = 'shensha-item';
          const vStr = Array.isArray(val) ? val.join('、') : val;
          div.innerHTML = `<span class="shensha-name">${name}</span><span class="shensha-val">${vStr}</span>`;
          sg.appendChild(div);
        });
      } else {
        sg.innerHTML = '<div style="color:#a08870;font-size:0.85rem;text-align:center;padding:8px 0">无流年神煞</div>';
      }

      // Show 流年详情
      const detailSection = document.getElementById('flowDetailSection');
      detailSection.style.display = 'block';
      document.getElementById('flowYearLabel').textContent = `· ${year}年`;

      const bgColor = WU_XING_COLOR[lr.wxG] || '#888';
      const content = document.getElementById('flowDetailContent');

      // Recalculate full shensha for display
      const allShenshaEntries = [];
      const ssFull = {};
      const guiRen2 = calcTianYiGuiRen(lr.gan).slice(0,2);
      if (guiRen2.length) ssFull['天乙贵人'] = guiRen2;
      const wc2 = calcWenChang(lr.gan);
      if (wc2) ssFull['文昌贵人'] = wc2;
      const ym2 = calcYiMa(lr.zhi);
      if (ym2) ssFull['驿马'] = ym2;
      const th2 = calcTaoHua(lr.zhi);
      if (th2) ssFull['桃花'] = th2;
      const hg2 = calcHuaGai(lr.zhi);
      if (hg2) ssFull['华盖'] = hg2;
      mergeObj(ssFull, lr.shenSha);
      Object.entries(ssFull).forEach(([name, val]) => allShenshaEntries.push({name, val: Array.isArray(val) ? val.join('、') : val}));

      content.innerHTML = `
        <div class="flow-detail-content">
          <div class="flow-detail-item">
            <div class="fd-label">流年干支</div>
            <div class="fd-value" style="color:${bgColor};font-size:1.2rem">${lr.gan}${lr.zhi}</div>
            <div style="color:#a08870;font-size:0.75rem">${lr.year}年 · ${lr.shengXiao}年</div>
          </div>
          <div class="flow-detail-item">
            <div class="fd-label">五行纳音</div>
            <div class="fd-value">${lr.wxG}${lr.wxZ}</div>
            <div style="color:#a08870;font-size:0.75rem">${lr.naYin}</div>
          </div>
          <div class="flow-detail-item">
            <div class="fd-label">对日主十神</div>
            <div class="fd-value">${lr.shiShen}</div>
            <div style="color:#a08870;font-size:0.75rem">日主${r.riGan}遇${lr.gan}</div>
          </div>
          <div class="flow-detail-item">
            <div class="fd-label">十二长生</div>
            <div class="fd-value">${lr.changSheng}</div>
            <div style="color:#a08870;font-size:0.75rem">日主${r.riGan}遇${lr.zhi}</div>
          </div>
          <div class="flow-detail-item">
            <div class="fd-label">流年神煞</div>
            <div class="fd-chips">
              ${allShenshaEntries.map(s => `<span class="fd-chip"><span style="color:#a08870">${s.name}</span> <span style="color:#d4af37;font-weight:500">${s.val}</span></span>`).join('')}
            </div>
          </div>
          <div class="flow-detail-item">
            <div class="fd-label">与四柱关系</div>
            <div class="fd-chips">
              ${(lr.relations || []).map(rel => {
                const isBad = ['六冲','六害','三刑','相刑','自刑'].includes(rel.relation);
                const isGood = ['六合','三合','半合'].includes(rel.relation);
                const clr = isBad ? '#e57373' : isGood ? '#81c784' : '#d4af37';
                return `<span class="fd-chip"><span style="color:#a08870">${rel.pillar}${rel.zhi}</span> <span style="color:${clr};font-weight:500">${rel.relation}</span></span>`;
              }).join('')}
            </div>
          </div>
        </div>
      `;

      // Scroll into view smoothly
      detailSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function mergeObj(target, source) {
      for (const [k, v] of Object.entries(source)) {
        if (target[k]) {
          const existing = Array.isArray(target[k]) ? target[k] : [target[k]];
          const add = Array.isArray(v) ? v : [v];
          add.forEach(item => { if (!existing.includes(item)) existing.push(item); });
          target[k] = existing;
        } else {
          target[k] = v;
        }
      }
    }
  </script>
</body>
</html>
