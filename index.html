<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八字排盘 - 四柱八字在线测算</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cascade-section { margin: 6px 0 3px; }
    .cascade-section h4 { color: #b89a6a; font-size: 0.68rem; letter-spacing: 1px; margin-bottom: 3px; font-weight: 500; }
    .cascade-grid { display: flex; flex-wrap: wrap; gap: 2px; }
    .cascade-chip { display: inline-flex; flex-direction: column; align-items: center; padding: 1px 5px; border-radius: 3px; font-size: 0.62rem; cursor: pointer; transition: all 0.12s; border: 1px solid rgba(212,175,55,0.08); background: rgba(40,25,15,0.4); color: #b89a6a; min-width: 32px; }
    .cascade-chip:hover { border-color: #d4af37; background: rgba(212,175,55,0.08); }
    .cascade-chip.active { border-color: #d4af37; background: rgba(212,175,55,0.12); color: #d4af37; }
    .cascade-chip .cc-label { font-size: 0.5rem; color: #5a4a3a; }
    .cascade-chip .cc-ganzhi { font-size: 0.65rem; font-weight: 600; color: #e8d5c0; }
    .cascade-chip.active .cc-ganzhi { color: #d4af37; }

    /* ── Sticky Overview ── */
    .sticky-overview {
      background: linear-gradient(145deg, rgba(40,25,15,0.97), rgba(30,18,10,0.99));
      border: 1px solid rgba(212,175,55,0.15);
      border-radius: 10px;
      padding: 8px 10px;
    }
    .so-title { color: #d4af37; font-size: 0.72rem; letter-spacing: 2px; margin-bottom: 5px; font-weight: 500; }
    .so-boxes { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; }
    .so-box {
      text-align: center;
      min-width: 62px;
      padding: 5px 6px 4px;
      border: 1px solid rgba(212,175,55,0.12);
      border-radius: 7px;
      background: rgba(40,25,15,0.5);
      flex-shrink: 0;
    }
    .so-box.so-box-flow { background: rgba(212,175,55,0.06); border-color: rgba(212,175,55,0.18); }
    .so-box .sb-label { font-size: 0.55rem; color: #a08870; letter-spacing: 1px; margin-bottom: 1px; }
    .so-box .sb-gan { font-size: 1.05rem; font-weight: 700; line-height: 1.15; }
    .so-box .sb-zhi { font-size: 1.05rem; font-weight: 700; line-height: 1.15; }
    .so-box .sb-meta { font-size: 0.55rem; color: #6a5a4a; margin-top: 1px; line-height: 1.2; }
    .so-box .sb-meta .sm-ss { color: #b89a6a; }
    .so-box .sb-meta .sm-cs { color: #a08870; }
    .so-shensha { display: flex; flex-wrap: wrap; gap: 2px; padding-top: 3px; border-top: 1px solid rgba(212,175,55,0.06); }
    .so-shensha-item { font-size: 0.6rem; padding: 0 5px; border-radius: 2px; background: rgba(212,175,55,0.04); color: #a08870; }
    .so-shensha-item .ss-name { color: #6a5a4a; }
    .so-shensha-item .ss-val { color: #d4af37; font-weight: 500; }
    .so-relations { display: flex; flex-wrap: wrap; gap: 2px; padding-top: 2px; }
    .so-rel { font-size: 0.58rem; padding: 0 4px; border-radius: 2px; }

    /* ── AI ── */
    .ai-loading { display:flex; justify-content:center; gap:8px; margin-bottom:10px; }
    .ai-loading span { width:10px; height:10px; border-radius:50%; background:#d4af37; animation:aiPulse 1.2s ease-in-out infinite; }
    .ai-loading span:nth-child(2) { animation-delay:0.2s; }
    .ai-loading span:nth-child(3) { animation-delay:0.4s; }
    @keyframes aiPulse { 0%,80%,100% { opacity:0.2; transform:scale(0.8); } 40% { opacity:1; transform:scale(1.2); } }
    .ai-result-inner { font-size:0.82rem; line-height:1.7; color:#e8d5c0; }
    .ai-result-inner h4 { color:#d4af37; font-size:0.88rem; margin:14px 0 5px; font-weight:600; letter-spacing:1px; border-bottom:1px solid rgba(212,175,55,0.1); padding-bottom:3px; }
    .ai-result-inner h5 { color:#b89a6a; font-size:0.8rem; margin:8px 0 3px; font-weight:500; }
    .ai-result-inner p { margin:3px 0; }
    .ai-result-inner ul { margin:3px 0; padding-left:16px; }
    .ai-result-inner li { margin:1px 0; list-style-type:disc; color:#c8b894; }
    .ai-result-inner strong { color:#d4af37; }
    .ai-result-inner .table-wrap { overflow-x:auto; margin:6px 0; }
    .ai-result-inner table { width:100%; border-collapse:collapse; font-size:0.75rem; }
    .ai-result-inner td, .ai-result-inner th { border:1px solid rgba(212,175,55,0.12); padding:3px 6px; text-align:center; }
    .ai-result-inner th { background:rgba(212,175,55,0.06); color:#b89a6a; font-weight:500; }
    .ai-error { color:#e57373; font-size:0.82rem; padding:10px; text-align:center; background:rgba(229,115,115,0.06); border-radius:8px; border:1px solid rgba(229,115,115,0.15); }
    @media (max-width: 640px) {
      .so-box { min-width: 52px; padding: 4px 4px 3px; }
      .so-box .sb-gan, .so-box .sb-zhi { font-size: 0.85rem; }
      .so-box .sb-meta { font-size: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>八字排盘</h1>
      <p>四柱八字 · 五行推演 · 命理分析</p>
    </header>

    <div class="form-section">
      <h2>◆ 请输入出生信息</h2>
      <form id="baziForm" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label>年</label>
            <select id="birthYear"></select>
          </div>
          <div class="form-group">
            <label>月</label>
            <select id="birthMonth">
              <option value="1">1 月</option><option value="2">2 月</option>
              <option value="3">3 月</option><option value="4">4 月</option>
              <option value="5">5 月</option><option value="6">6 月</option>
              <option value="7">7 月</option><option value="8">8 月</option>
              <option value="9">9 月</option><option value="10">10 月</option>
              <option value="11">11 月</option><option value="12">12 月</option>
            </select>
          </div>
          <div class="form-group">
            <label>日</label>
            <select id="birthDay"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>时辰</label>
            <select id="birthHour">
              <option value="0">子时 (23:00-00:59)</option>
              <option value="1">丑时 (01:00-02:59)</option>
              <option value="2">寅时 (03:00-04:59)</option>
              <option value="3">卯时 (05:00-06:59)</option>
              <option value="4">辰时 (07:00-08:59)</option>
              <option value="5">巳时 (09:00-10:59)</option>
              <option value="6" selected>午时 (11:00-12:59)</option>
              <option value="7">未时 (13:00-14:59)</option>
              <option value="8">申时 (15:00-16:59)</option>
              <option value="9">酉时 (17:00-18:59)</option>
              <option value="10">戌时 (19:00-20:59)</option>
              <option value="11">亥时 (21:00-22:59)</option>
            </select>
          </div>
          <div class="form-group">
            <label>性别</label>
            <select id="birthGender">
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-submit">开 始 排 盘</button>
      </form>
    </div>

    <div class="result-section" id="resultSection">
      <div class="result-sticky" id="resultSticky">
        <div class="sticky-overview">
          <div class="so-title">◆ 八字总览</div>
          <div class="so-boxes" id="soBoxes"></div>
          <div class="so-shensha" id="soShensha"></div>
          <div class="so-relations" id="soRelations"></div>
        </div>
      </div>

      <div class="form-section" style="padding-top:4px">
        <div class="info-grid">
          <div class="info-card full-width" id="riGanCard" style="display:none">
            <h3>◆ 日主</h3>
            <div style="text-align:center;padding:6px 0">
              <span class="gan-day-master" id="riGanDisplay"></span>
              <div style="color:#b89a6a;font-size:0.82rem;margin-top:3px" id="riGanDesc"></div>
            </div>
          </div>

          <div class="info-card">
            <h3>◆ 命主信息</h3>
            <div class="info-row"><span class="info-label">生肖</span><span class="info-value" id="shengXiao"></span></div>
            <div class="info-row"><span class="info-label">性别</span><span class="info-value" id="genderDisplay"></span></div>
            <div class="info-row"><span class="info-label">日干五行</span><span class="info-value" id="riWxDisplay"></span></div>
            <div class="info-row"><span class="info-label">日支藏干</span><span class="info-value" id="cangGanDisplay"></span></div>
          </div>

          <div class="info-card">
            <h3>◆ 十神</h3>
            <div class="info-row"><span class="info-label">年柱</span><span class="info-value" id="ssYear"></span></div>
            <div class="info-row"><span class="info-label">月柱</span><span class="info-value" id="ssMonth"></span></div>
            <div class="info-row"><span class="info-label">日柱</span><span class="info-value" id="ssDay">日主</span></div>
            <div class="info-row"><span class="info-label">时柱</span><span class="info-value" id="ssHour"></span></div>
          </div>

          <div class="info-card">
            <h3>◆ 十二长生</h3>
            <div class="info-row"><span class="info-label">年柱</span><span class="info-value" id="csYear"></span></div>
            <div class="info-row"><span class="info-label">月柱</span><span class="info-value" id="csMonth"></span></div>
            <div class="info-row"><span class="info-label">日柱</span><span class="info-value" id="csDay"></span></div>
            <div class="info-row"><span class="info-label">时柱</span><span class="info-value" id="csHour"></span></div>
          </div>

          <div class="info-card">
            <h3>◆ 纳音五行</h3>
            <div class="info-row"><span class="info-label">年柱</span><span class="info-value" id="nayinYear"></span></div>
            <div class="info-row"><span class="info-label">月柱</span><span class="info-value" id="nayinMonth"></span></div>
            <div class="info-row"><span class="info-label">日柱</span><span class="info-value" id="nayinDay"></span></div>
            <div class="info-row"><span class="info-label">时柱</span><span class="info-value" id="nayinHour"></span></div>
          </div>

          <div class="info-card full-width">
            <h3>◆ 五行分布</h3>
            <div class="wuxing-bar" id="wuxingBar"></div>
            <div class="wuxing-bar-total" id="wuxingTags"></div>
          </div>

          <div class="info-card full-width" id="shenshaCard">
            <h3>◆ 神煞</h3>
            <div class="shensha-grid" id="shenshaGrid"></div>
          </div>

          <div class="info-card full-width" id="dayunCard">
            <h3>◆ 大运排布 <span style="color:#5a4a3a;font-weight:400;font-size:0.72rem">（点击查看，上方面板同步更新）</span></h3>
            <div id="dayunInfo" style="margin-bottom:10px;font-size:0.85rem;color:#b89a6a"></div>
            <div class="dayun-table-wrap">
              <table class="dayun-table" id="dayunTable"></table>
            </div>
            <div id="flowCascadeArea"></div>
          </div>

          <div class="info-card full-width" id="aiCard">
            <h3>◆ AI 智能解盘</h3>
            <div id="aiConfig" style="margin-bottom:12px;font-size:0.78rem;color:#b89a6a">
              <div class="form-row" style="align-items:end">
                <div class="form-group" style="flex:2">
                  <label>API Key</label>
                  <input type="password" id="aiApiKey" placeholder="sk-..." style="font-size:0.78rem;padding:6px 8px">
                </div>
                <div class="form-group" style="flex:1">
                  <label>接口地址 <span style="color:#5a4a3a;font-weight:400">(默认免费)</span></label>
                  <select id="aiEndpoint" style="font-size:0.78rem;padding:6px 8px">
                    <option value="https://api.deepseek.com/v1/chat/completions">DeepSeek（免费 · 推荐）</option>
                    <option value="https://openrouter.ai/api/v1/chat/completions">OpenRouter（备选）</option>
                    <option value="https://api.openai.com/v1/chat/completions">OpenAI（备选）</option>
                  </select>
                </div>
                <div class="form-group" style="flex:1">
                  <label>模型</label>
                  <input type="text" id="aiModel" value="deepseek-chat" placeholder="模型名" style="font-size:0.78rem;padding:6px 8px">
                </div>
              </div>
              <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
                <button type="button" class="btn-submit" id="aiAnalyzeBtn" style="padding:8px 20px;font-size:0.85rem;letter-spacing:2px;margin-top:0;flex:1;min-width:120px">开始AI解盘</button>
                <button type="button" id="aiSaveKeyBtn" style="padding:8px 14px;font-size:0.78rem;background:rgba(212,175,55,0.1);color:#b89a6a;border:1px solid rgba(212,175,55,0.2);border-radius:6px;cursor:pointer;font-family:inherit">保存配置</button>
              </div>
            </div>
            <div id="aiStatus" style="display:none;text-align:center;padding:20px 0;color:#a08870;font-size:0.85rem">
              <div class="ai-loading"><span></span><span></span><span></span></div>
              <div id="aiStatusText">AI 正在分析···</div>
            </div>
            <div id="aiResult" style="display:none">
              <div class="ai-result-inner" id="aiResultInner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">仅供学习参考 · 传统文化研究</div>
  </div>

  <script src="js/bazi.js"></script>
  <script>
    const MONTH_NAMES = ['寅月','卯月','辰月','巳月','午月','未月','申月','酉月','戌月','亥月','子月','丑月'];
    const HOUR_NAMES = ['子时','丑时','寅时','卯时','辰时','巳时','午时','未时','申时','酉时','戌时','亥时'];
    let lastResult = null;
    let flow = { year: null, monthIdx: null, day: null, hourIdx: null, daYunIdx: null };
    let expandedDayunIdx = -1;
    const defaultDate = getDefaultDate();

    function calcLiuYueByYear(yearGan) {
      const ysi = TIAN_GAN.indexOf(yearGan);
      const arr = [];
      for (let i = 0; i < 12; i++) {
        const s = (ysi % 5 * 2 + i + 1) % 10;
        const b = (i + 2) % 12;
        arr.push({ idx: i, gan: TIAN_GAN[s], zhi: DI_ZHI[b], label: MONTH_NAMES[i] });
      }
      return arr;
    }
    function calcLiuRiByMonth(yr, mo) {
      const days = new Date(yr, mo, 0).getDate();
      const arr = [];
      for (let d = 1; d <= days; d++) {
        const dp = calcDayPillar(yr, mo, d);
        arr.push({ day: d, gan: dp.stem, zhi: dp.branch });
      }
      return arr;
    }
    function calcLiuShiByDay(dayGan) {
      const dsi = TIAN_GAN.indexOf(dayGan);
      const arr = [];
      for (let i = 0; i < 12; i++) {
        const s = (dsi % 5 * 2 + i) % 10;
        arr.push({ idx: i, gan: TIAN_GAN[s], zhi: DI_ZHI[i], label: HOUR_NAMES[i] });
      }
      return arr;
    }
    function calcSimpleShensha(gan, zhi) {
      const o = {};
      const gr = calcTianYiGuiRen(gan).slice(0, 2);
      if (gr.length) o['天乙贵人'] = gr;
      const wc = calcWenChang(gan); if (wc) o['文昌贵人'] = wc;
      const ym = calcYiMa(zhi); if (ym) o['驿马'] = ym;
      const th = calcTaoHua(zhi); if (th) o['桃花'] = th;
      const hg = calcHuaGai(zhi); if (hg) o['华盖'] = hg;
      return o;
    }
    function mergeObj(t, s) {
      for (const [k, v] of Object.entries(s)) {
        if (t[k]) { const e = Array.isArray(t[k]) ? t[k] : [t[k]]; const a = Array.isArray(v) ? v : [v]; a.forEach(i => { if (!e.includes(i)) e.push(i); }); t[k] = e; }
        else t[k] = v;
      }
    }
    function getNianZhiIndex(year, month, day) {
      const md = month * 100 + day;
      const y = md < 204 ? year - 1 : year;
      return ((y - 4) % 12 + 12) % 12;
    }

    // ── Init ──
    (function initForm() {
      const ys = document.getElementById('birthYear');
      for (let y = 1900; y <= 2100; y++) { const o = document.createElement('option'); o.value = y; o.textContent = y + ' 年'; if (y === defaultDate.year) o.selected = true; ys.appendChild(o); }
      document.getElementById('birthMonth').value = defaultDate.month;
      const ds = document.getElementById('birthDay');
      for (let d = 1; d <= 31; d++) { const o = document.createElement('option'); o.value = d; o.textContent = d + ' 日'; if (d === defaultDate.day) o.selected = true; ds.appendChild(o); }
      document.getElementById('birthHour').value = getHourBranchIdx(defaultDate.hour, defaultDate.minute);
    })();

    document.getElementById('baziForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const year = parseInt(document.getElementById('birthYear').value);
      const month = parseInt(document.getElementById('birthMonth').value);
      const day = parseInt(document.getElementById('birthDay').value);
      const hourBranch = parseInt(document.getElementById('birthHour').value);
      const gender = document.getElementById('birthGender').value;
      const hourMap = { 0: [23, 0], 1: [1, 0], 2: [3, 0], 3: [5, 0], 4: [7, 0], 5: [9, 0], 6: [11, 0], 7: [13, 0], 8: [15, 0], 9: [17, 0], 10: [19, 0], 11: [21, 0] };
      const [hour, minute] = hourMap[hourBranch];
      const result = calcBazi(year, month, day, hour, minute, gender);
      lastResult = result;
      flow = { year: null, monthIdx: null, day: null, hourIdx: null, daYunIdx: null };
      displayResult(result);
    });

    // ── Display ──
    function displayResult(r) {
      // Overview boxes: original 4 pillars
      const boxes = r.pillars.map((p, i) => ({
        label: p.name, gan: p.gan, zhi: p.zhi,
        wxG: WU_XING_TG[p.gan], wxZ: WU_XING_DZ[p.zhi],
        ss: r.shiShen[i], cs: r.changSheng[i],
        flow: false
      }));
      renderBoxes(boxes);
      updateShenshaRelations(r.shenSha, []);

      // Info cards
      document.getElementById('shengXiao').textContent = r.shengXiao;
      document.getElementById('genderDisplay').textContent = r.gender;
      document.getElementById('riWxDisplay').textContent = r.riWx;
      document.getElementById('cangGanDisplay').textContent = r.cangGan[2].join('、');
      document.getElementById('ssYear').textContent = r.shiShen[0];
      document.getElementById('ssMonth').textContent = r.shiShen[1];
      document.getElementById('ssDay').textContent = '日主';
      document.getElementById('ssHour').textContent = r.shiShen[3];
      document.getElementById('csYear').textContent = r.changSheng[0];
      document.getElementById('csMonth').textContent = r.changSheng[1];
      document.getElementById('csDay').textContent = r.changSheng[2];
      document.getElementById('csHour').textContent = r.changSheng[3];
      document.getElementById('nayinYear').textContent = r.nayin[0];
      document.getElementById('nayinMonth').textContent = r.nayin[1];
      document.getElementById('nayinDay').textContent = r.nayin[2];
      document.getElementById('nayinHour').textContent = r.nayin[3];

      // 五行 bar
      const bar = document.getElementById('wuxingBar'); bar.innerHTML = '';
      ['木','火','土','金','水'].forEach(wx => {
        if (r.wuxingCount[wx] > 0) { const seg = document.createElement('div'); seg.className = 'wuxing-bar-seg'; seg.style.width = r.wuxingPercent[wx] + '%'; seg.style.background = WU_XING_COLOR[wx]; seg.textContent = r.wuxingPercent[wx] >= 10 ? wx : ''; bar.appendChild(seg); }
      });
      const tags = document.getElementById('wuxingTags'); tags.innerHTML = '';
      ['木','火','土','金','水'].forEach(wx => {
        const tag = document.createElement('span'); tag.className = 'wuxing-tag'; tag.style.background = WU_XING_COLOR[wx] + '33'; tag.style.color = WU_XING_COLOR[wx]; tag.innerHTML = wx + ' ' + r.wuxingCount[wx] + ' (' + r.wuxingPercent[wx] + '%)'; tags.appendChild(tag);
      });
      if (r.missingWx.length > 0) { const mt = document.createElement('span'); mt.className = 'wuxing-tag'; mt.style.background = '#555'; mt.style.color = '#ccc'; mt.textContent = '缺: ' + r.missingWx.join('、'); tags.appendChild(mt); }

      // 神煞
      const sg = document.getElementById('shenshaGrid'); sg.innerHTML = '';
      const se = Object.entries(r.shenSha);
      if (!se.length) { sg.innerHTML = '<div style="color:#a08870;font-size:0.85rem;text-align:center;padding:8px 0">无显著神煞</div>'; }
      else { se.forEach(([name, val]) => { const d = document.createElement('div'); d.className = 'shensha-item'; d.innerHTML = '<span class="shensha-name">' + name + '</span><span class="shensha-val">' + (Array.isArray(val) ? val.join('、') : val) + '</span>'; sg.appendChild(d); }); }

      // 大运
      const dy = r.daYun;
      document.getElementById('dayunInfo').innerHTML = '起运年龄：<strong>' + dy.startAge + ' 岁</strong> &nbsp;·&nbsp; 排法：<strong>' + (dy.shunPai ? '顺排' : '逆排') + '</strong>';
      const dt = document.getElementById('dayunTable'); dt.innerHTML = '';
      const th = document.createElement('thead'); th.innerHTML = '<tr><th>大运</th><th>年龄</th><th>天干</th><th>地支</th><th>五行</th><th>纳音</th></tr>'; dt.appendChild(th);

    // ── Overview Panel ──
    function renderBoxes(boxes) {
      document.getElementById('soBoxes').innerHTML = boxes.map(b =>
        '<div class="so-box' + (b.flow ? ' so-box-flow' : '') + '">' +
          '<div class="sb-label">' + b.label + '</div>' +
          '<div class="sb-gan" style="color:' + WU_XING_COLOR[b.wxG] + '">' + b.gan + '</div>' +
          '<div class="sb-zhi" style="color:' + WU_XING_COLOR[b.wxZ] + '">' + b.zhi + '</div>' +
          '<div class="sb-meta"><span class="sm-ss">' + b.ss + '</span> · <span class="sm-cs">' + b.cs + '</span></div>' +
        '</div>'
      ).join('');
    }

    function updateShenshaRelations(shensha, relations) {
      const ssEl = document.getElementById('soShensha');
      const ssEntries = Object.entries(shensha);
      ssEl.innerHTML = ssEntries.length
        ? ssEntries.map(([n, v]) => '<span class="so-shensha-item"><span class="ss-name">' + n + '</span> <span class="ss-val">' + (Array.isArray(v) ? v.join('、') : v) + '</span></span>').join('')
        : '';

      const relEl = document.getElementById('soRelations');
      relEl.innerHTML = relations.length
        ? relations.map(r => {
            const bad = ['六冲', '六害', '三刑', '相刑', '自刑'].includes(r.rel);
            const good = ['六合', '三合', '半合'].includes(r.rel);
            const clr = bad ? '#e57373' : good ? '#81c784' : '#d4af37';
            return '<span class="so-rel"><span style="color:#6a5a4a">' + r.pillar + '</span> <span style="color:' + clr + ';font-weight:600">' + r.rel + '</span></span>';
          }).join('')
        : '';
    }

    // ── 大运 Click ──
    document.getElementById('dayunTable').addEventListener('click', function(e) {
      const row = e.target.closest('tr[data-dayun-index]');

    function toggleDayunFlow(idx) {
      const exist = document.querySelector('.dayun-expand-row');
      if (exist) {
        exist.remove();
        document.querySelectorAll('.dayun-table tbody tr').forEach(r => r.classList.remove('dayun-active'));
        if (expandedDayunIdx === idx) {
          expandedDayunIdx = -1; flow = { year: null, monthIdx: null, day: null, hourIdx: null, daYunIdx: null };
          document.getElementById('flowCascadeArea').innerHTML = '';
          const r = lastResult;
          const boxes = r.pillars.map((p, i) => ({ label: p.name, gan: p.gan, zhi: p.zhi, wxG: WU_XING_TG[p.gan], wxZ: WU_XING_DZ[p.zhi], ss: r.shiShen[i], cs: r.changSheng[i], flow: false }));
          renderBoxes(boxes);
          updateShenshaRelations(r.shenSha, []);
          return;
        }
      }
      expandedDayunIdx = idx; flow.daYunIdx = idx;
      const row = document.querySelector('.dayun-table tbody tr[data-dayun-index="' + idx + '"]');
      if (!row) return;
      row.classList.add('dayun-active');

      const dy = lastResult.daYun.pillars[idx];
      const birthYear = parseInt(document.getElementById('birthYear').value);
      const startYear = birthYear + dy.ageFrom;
      let html = '';
      for (let i = 0; i < 10; i++) {
        const y = startYear + i;
        const gi = ((y - 4) % 10 + 10) % 10, bi = ((y - 4) % 12 + 12) % 12;
        const act = flow.year === y ? ' active' : '';
        html += '<span class="flow-year-chip' + act + '" data-flow="year" data-year="' + y + '"><span class="fy-year">' + y + '</span><span class="fy-ganzhi">' + TIAN_GAN[gi] + DI_ZHI[bi] + '</span></span>';
      }

      er.innerHTML = '<td colspan="6"><div class="dayun-flow-wrap"><div class="dayun-flow-years">' + html + '</div></div></td>';
      row.after(er);

      // Update overview: original 4 + 大运 box
      const r = lastResult;
      const riGan = r.riGan;
      const ss = calcShiShen(riGan, dy.gan);
      const cs = calcChangSheng(riGan, DI_ZHI.indexOf(dy.zhi));
      const boxes = r.pillars.map((p, i) => ({ label: p.name, gan: p.gan, zhi: p.zhi, wxG: WU_XING_TG[p.gan], wxZ: WU_XING_DZ[p.zhi], ss: r.shiShen[i], cs: r.changSheng[i], flow: false }));

    function getLiuNianResult(year) {
      const r = lastResult;
      const by = parseInt(document.getElementById('birthYear').value);
      const bm = parseInt(document.getElementById('birthMonth').value);
      const bd = parseInt(document.getElementById('birthDay').value);
      const nianZhi = DI_ZHI[getNianZhiIndex(by, bm, bd)];
      return calcLiuNian(year, r.riGan, TIAN_GAN.indexOf(r.riGan), r.pillars, nianZhi, r.pillars[1].zhi);
    }

    function rebuildBoxesWithFlow(extraBoxes, shensha, relations) {
      const r = lastResult;
      const boxes = r.pillars.map((p, i) => ({ label: p.name, gan: p.gan, zhi: p.zhi, wxG: WU_XING_TG[p.gan], wxZ: WU_XING_DZ[p.zhi], ss: r.shiShen[i], cs: r.changSheng[i], flow: false }));
      extraBoxes.forEach(b => boxes.push(b));
      renderBoxes(boxes);

    function selectFlowYear(year) {
      flow.year = year; flow.monthIdx = null; flow.day = null; flow.hourIdx = null;
      document.querySelectorAll('.flow-year-chip').forEach(c => { c.classList.toggle('active', parseInt(c.dataset.year) === year); });

      const r = lastResult;
      const dy = r.daYun.pillars[expandedDayunIdx];
      const allSha = calcSimpleShensha(lr.gan, lr.zhi);
      mergeObj(allSha, lr.shenSha);

      rebuildBoxesWithFlow([
        { label: '大运' + dy.index, gan: dy.gan, zhi: dy.zhi, wxG: dy.wxG, wxZ: dy.wxZ, ss: calcShiShen(r.riGan, dy.gan), cs: calcChangSheng(r.riGan, DI_ZHI.indexOf(dy.zhi)), flow: true },
        { label: '流年', gan: lr.gan, zhi: lr.zhi, wxG: lr.wxG, wxZ: lr.wxZ, ss: lr.shiShen, cs: lr.changSheng, flow: true }
      ], allSha, (lr.relations || []).map(r => ({ pillar: r.pillar + r.zhi, rel: r.relation })));

      showCascade('month', calcLiuYueByYear(lr.gan).map(m =>
        ({ idx: m.idx, label: m.label, gan: m.gan, zhi: m.zhi, cls: flow.monthIdx === m.idx ? ' active' : '', data: 'data-flow="month" data-month-idx="' + m.idx + '"' })
      ));

      ], mSha, []);

      const days = calcLiuRiByMonth(calY, calM);

        { label: '流月', gan: mGan, zhi: mZhi, wxG: WU_XING_TG[mGan], wxZ: WU_XING_DZ[mZhi], ss: calcShiShen(r.riGan, mGan), cs: calcChangSheng(r.riGan, (flow.monthIdx + 2) % 12), flow: true },

      ), 'day', days.map(d =>
        ({ idx: d.day, label: d.day + '日', gan: d.gan, zhi: d.zhi, cls: flow.day === d.day ? ' active' : '', data: 'data-flow="day" data-day="' + d.day + '"' })
      ), 'hour', hours.map(h =>

    function selectFlowHour(hourIdx) {

      document.querySelectorAll('[data-flow="hour"]').forEach(c => { c.classList.toggle('active', parseInt(c.dataset.hourIdx) === hourIdx); });
      const lr = getLiuNianResult(flow.year);
      const r = lastResult;
      const calM = flow.monthIdx + 2 <= 12 ? flow.monthIdx + 2 : flow.monthIdx + 2 - 12;
      const calY = flow.monthIdx + 2 <= 12 ? flow.year : flow.year + 1;
      const dp = calcDayPillar(calY, calM, flow.day);
      const hours = calcLiuShiByDay(dp.stem);
      const h = hours[hourIdx];
      const hSs = calcShiShen(r.riGan, h.gan), hCs = calcChangSheng(r.riGan, hourIdx);

      rebuildBoxesWithFlow([
        { label: '大运' + dy.index, gan: dy.gan, zhi: dy.zhi, wxG: dy.wxG, wxZ: dy.wxZ, ss: calcShiShen(r.riGan, dy.gan), cs: calcChangSheng(r.riGan, DI_ZHI.indexOf(dy.zhi)), flow: true },
        { label: '流年', gan: lr.gan, zhi: lr.zhi, wxG: lr.wxG, wxZ: lr.wxZ, ss: lr.shiShen, cs: lr.changSheng, flow: true },
        { label: '流月', gan: mGan, zhi: mZhi, wxG: WU_XING_TG[mGan], wxZ: WU_XING_DZ[mZhi], ss: calcShiShen(r.riGan, mGan), cs: calcChangSheng(r.riGan, (flow.monthIdx + 2) % 12), flow: true },
        { label: '流日', gan: dp.stem, zhi: dp.branch, wxG: WU_XING_TG[dp.stem], wxZ: WU_XING_DZ[dp.branch], ss: calcShiShen(r.riGan, dp.stem), cs: calcChangSheng(r.riGan, DI_ZHI.indexOf(dp.branch)), flow: true },
        { label: '流时', gan: h.gan, zhi: h.zhi, wxG: WU_XING_TG[h.gan], wxZ: WU_XING_DZ[h.zhi], ss: hSs, cs: hCs, flow: true }
      ], hSha, []);

      const ly = calcLiuYueByYear(lr.gan);
      const days = calcLiuRiByMonth(calY, calM);
      showCascade('month', ly.map(m =>
        ({ idx: m.idx, label: m.label, gan: m.gan, zhi: m.zhi, cls: flow.monthIdx === m.idx ? ' active' : '', data: 'data-flow="month" data-month-idx="' + m.idx + '"' })
      ), 'day', days.map(d =>
        ({ idx: d.day, label: d.day + '日', gan: d.gan, zhi: d.zhi, cls: flow.day === d.day ? ' active' : '', data: 'data-flow="day" data-day="' + d.day + '"' })
      ), 'hour', hours.map(h =>
        ({ idx: h.idx, label: h.label, gan: h.gan, zhi: h.zhi, cls: flow.hourIdx === h.idx ? ' active' : '', data: 'data-flow="hour" data-hour-idx="' + h.idx + '"' })
      ));

    // ── Helpers ──
    function showCascade() {
      const levels = Array.from(arguments);
      let html = '';
      for (let i = 0; i < levels.length; i += 2) {
        const label = levels[i];
        const items = levels[i + 1] || [];
        if (!items.length) continue;
        const name = { month: '流月', day: '流日', hour: '流时' }[label] || label;
        html += '<div class="cascade-section"><h4>◆ ' + name + '</h4><div class="cascade-grid">' +
          items.map(it => '<span class="cascade-chip' + it.cls + '" ' + it.data + '><span class="cc-label">' + it.label + '</span><span class="cc-ganzhi">' + it.gan + it.zhi + '</span></span>').join('') +
          '</div></div>';
      }
      document.getElementById('flowCascadeArea').innerHTML = html;
    }

    function buildShenshaGrid(sha) {
      const sg = document.getElementById('shenshaGrid'); sg.innerHTML = '';
      const se = Object.entries(sha);
      if (!se.length) { sg.innerHTML = '<div style="color:#a08870;font-size:0.85rem;text-align:center;padding:8px 0">无显著神煞</div>'; return; }
      se.forEach(([name, val]) => { const d = document.createElement('div'); d.className = 'shensha-item'; d.innerHTML = '<span class="shensha-name">' + name + '</span><span class="shensha-val">' + (Array.isArray(val) ? val.join('、') : val) + '</span>'; sg.appendChild(d); });
    }

    // ═══════════════════════════════════════════
    //  AI 智能解盘
    // ═══════════════════════════════════════════
    const AI_STORAGE_KEY = 'bazi_ai_config';
    function loadAIConfig() { try { const raw = localStorage.getItem(AI_STORAGE_KEY); if (raw) return JSON.parse(raw); } catch (_) {} return { key: '', endpoint: 'https://api.deepseek.com/v1/chat/completions', model: 'deepseek-chat' }; }
    function saveAIConfig() {
      const cfg = { key: document.getElementById('aiApiKey').value.trim(), endpoint: document.getElementById('aiEndpoint').value, model: document.getElementById('aiModel').value.trim() };
      localStorage.setItem(AI_STORAGE_KEY, JSON.stringify(cfg));
      const btn = document.getElementById('aiSaveKeyBtn'); btn.textContent = '已保存 ✓'; btn.style.borderColor = '#81c784'; btn.style.color = '#81c784';
      setTimeout(() => { btn.textContent = '保存配置'; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
    }
    (function initAI() { const cfg = loadAIConfig(); document.getElementById('aiApiKey').value = cfg.key; document.getElementById('aiEndpoint').value = cfg.endpoint; document.getElementById('aiModel').value = cfg.model; })();
    document.getElementById('aiSaveKeyBtn').addEventListener('click', saveAIConfig);
    document.getElementById('aiAnalyzeBtn').addEventListener('click', function() { if (!lastResult) { document.getElementById('baziForm').requestSubmit(); return; } startAIAnalysis(); });
    let aiAbortController = null;

    async function startAIAnalysis() {
      const cfg = loadAIConfig();
      const keyInput = document.getElementById('aiApiKey').value.trim();
      if (!keyInput && !cfg.key) { showAIError('请先输入 API Key'); return; }
      const apiKey = keyInput || cfg.key, endpoint = document.getElementById('aiEndpoint').value, model = document.getElementById('aiModel').value.trim() || cfg.model;
      const r = lastResult, prompt = buildAIPrompt(r);
      document.getElementById('aiResult').style.display = 'none'; document.getElementById('aiResultInner').innerHTML = '';
      document.getElementById('aiStatus').style.display = 'block'; document.getElementById('aiStatusText').textContent = 'AI 正在分析···';
      document.getElementById('aiCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      if (aiAbortController) aiAbortController.abort();
      aiAbortController = new AbortController();
      try {
        let fullText = '';
        const streamOk = await callAIStream(apiKey, endpoint, model, prompt, (chunk) => { fullText += chunk; document.getElementById('aiStatusText').textContent = 'AI 思考中··· (' + fullText.length + '字)'; }, aiAbortController.signal);
        if (!streamOk || !fullText.trim()) fullText = await callAINonStream(apiKey, endpoint, model, prompt, aiAbortController.signal);
        document.getElementById('aiStatus').style.display = 'none'; document.getElementById('aiResult').style.display = 'block';
        renderAIResult(fullText);
      } catch (err) { if (err.name === 'AbortError') return; document.getElementById('aiStatus').style.display = 'none'; showAIError('请求失败: ' + err.message); }
    }
    function showAIError(msg) { document.getElementById('aiResult').style.display = 'block'; document.getElementById('aiResultInner').innerHTML = '<div class="ai-error">' + msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</div>'; }

    function buildAIPrompt(r) {
      const now = new Date();
      const curYear = now.getFullYear(), curMonth = now.getMonth() + 1, curDay = now.getDate();
      const curHour = now.getHours(), curMinute = now.getMinutes();
      const curDP = calcDayPillar(curYear, curMonth, curDay);
      const curHP = calcHourPillar(curDP.stemIdx, curHour, curMinute);
      const nZhi = DI_ZHI[getNianZhiIndex(parseInt(document.getElementById('birthYear').value), parseInt(document.getElementById('birthMonth').value), parseInt(document.getElementById('birthDay').value))];
      const curLN = calcLiuNian(curYear, r.riGan, TIAN_GAN.indexOf(r.riGan), r.pillars, nZhi, r.pillars[1].zhi);
      let dayunText = ''; r.daYun.pillars.forEach((p, i) => { dayunText += '\n    大运' + (i+1) + ': ' + p.gan + p.zhi + ' (' + p.wxG + p.wxZ + ' · ' + p.naYin + ')  ' + p.ageFrom + '-' + p.ageTo + '岁'; });
      let cangText = ''; r.pillars.forEach((p, i) => { const cg = r.cangGan[i]; if (cg.length) cangText += '\n    ' + p.name + '藏干: ' + cg.join('、'); });
      let ssZhiText = ''; r.pillars.forEach((p, i) => { const sz = r.shiShenZhi[i]; if (sz && sz.length) ssZhiText += '\n    ' + p.name + '藏干十神: ' + sz.join('、'); });
      return ['## 八字命盘信息', '### 基本信息', '出生: ' + document.getElementById('birthYear').value + '年' + document.getElementById('birthMonth').value + '月' + document.getElementById('birthDay').value + '日 ' + SHI_CHEN[parseInt(document.getElementById('birthHour').value)] + ' 性别: ' + r.gender,
        '### 四柱', r.pillars.map((p, i) => '  柱: ' + p.gan + p.zhi + '  五行: ' + WU_XING_TG[p.gan] + WU_XING_DZ[p.zhi] + '  纳音: ' + r.nayin[i] + '  十神: ' + r.shiShen[i] + '  十二长生: ' + r.changSheng[i] + '  阴阳: ' + r.yinyang[i].gan + r.yinyang[i].zhi).join('\n'),
        cangText, ssZhiText, '### 日主', '日干: ' + r.riGan + ' (' + r.riWx + ' · ' + r.riYinYang + ')', '日支: ' + r.riZhi + '  藏干: ' + r.cangGan[2].join('、'),
        '### 五行分布', Object.entries(r.wuxingCount).map(([k, v]) => '  ' + k + ': ' + v + ' (' + r.wuxingPercent[k] + '%)').join('\n'),
        '缺: ' + (r.missingWx.length ? r.missingWx.join('、') : '无') + '  旺: ' + (r.maxWx.length ? r.maxWx[0][0] : ''),
        '### 神煞', Object.entries(r.shenSha).map(([k, v]) => '  ' + k + ': ' + (Array.isArray(v) ? v.join('、') : v)).join('\n') || '  无显著神煞',
        '### 大运', '起运: ' + r.daYun.startAge + '岁  排法: ' + (r.daYun.shunPai ? '顺排' : '逆排'), dayunText,
        '### 当前流年 (' + curYear + '年)', '干支: ' + curLN.gan + curLN.zhi + '  五行: ' + curLN.wxG + curLN.wxZ + '  纳音: ' + curLN.naYin,
        '生肖: ' + curLN.shengXiao + '年', '对日主十神: ' + curLN.shiShen + '  十二长生: ' + curLN.changSheng,
        '流年神煞: ' + Object.entries(curLN.shenSha).map(([k, v]) => k + '(' + (Array.isArray(v) ? v.join('、') : v) + ')').join('、'),
        '与四柱关系: ' + (curLN.relations || []).map(r => r.pillar + r.zhi + '-' + r.relation).join('、'),
        '### 当前时间', '公历: ' + curYear + '-' + curMonth + '-' + curDay + ' ' + curHour + ':' + (curMinute < 10 ? '0' : '') + curMinute,
        '日柱: ' + curDP.stem + curDP.branch + '  时柱: ' + curHP.stem + curHP.branch
      ].join('\n');
    }

    async function callAIStream(apiKey, endpoint, model, prompt, onChunk, signal) {
      const sp = '你是一位精通中国传统命理学的八字命理师。请严格按以下步骤分析用户提供的八字命盘：\n\n1. **十神力量分析**：先确定各个十神的力量对比（考虑天干通根、地支藏干、月令旺衰、十二长生状态），所处位置（年/月/日/时柱），以及能够发挥作用的程度。\n\n2. **格局判断**：根据十神组合确定格局是否能成立（正格/变格/从格等），如有多种可能的格局，分别评估成立概率。\n\n3. **做功方式分析**：列出原局所有可能的做功方式（如官印相生、食神生财、杀印相生、比劫夺财等），分别评估每种做功方式的成立概率（列出概率百分比），选出最可信的做功方式。\n\n4. **喜用神确定**：根据选定做功方式确定喜用神（喜什么五行、十神），忌神是什么。\n\n5. **大运流年分析**：按照上述步骤重新评估最优做功方式，再论各步大运的喜忌吉凶。当前流年对原局的影响。\n\n6. **格局层次评估**：通过做功的效率和纯粹情况评估命局的整体层次（上等/中等/下等格局）。\n\n请用中文输出，使用Markdown格式，每个步骤用标题分隔（一、二、三、四、五、六）。语言专业但易懂，避免过于绝对的判断。';
      try {
        const resp = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey }, body: JSON.stringify({ model: model, messages: [{ role: 'system', content: sp }, { role: 'user', content: prompt }], stream: true, temperature: 0.7, max_tokens: 4096 }), signal: signal });
        if (!resp.ok) { const et = await resp.text().catch(() => ''); throw new Error('HTTP ' + resp.status + (et ? ': ' + et.slice(0, 200) : '')); }
        if (!resp.body) return false;
        const reader = resp.body.getReader(); const decoder = new TextDecoder(); let buf = ''; let has = false;
        while (true) { const { done, value } = await reader.read(); if (done) break; buf += decoder.decode(value, { stream: true }); const lines = buf.split('\n'); buf = lines.pop() || ''; for (const line of lines) { const t = line.trim(); if (!t || !t.startsWith('data: ')) continue; const d = t.slice(6); if (d === '[DONE]') continue; try { const p = JSON.parse(d); const c = p.choices?.[0]?.delta?.content || p.choices?.[0]?.text || ''; if (c) { onChunk(c); has = true; } } catch (_) {} } }
        return has;
      } catch (err) { if (err.name === 'AbortError') throw err; return false; }
    }

      const sp = '你是一位精通中国传统命理学的八字命理师。请严格按以下步骤分析用户提供的八字命盘：\n\n1. **十神力量分析**：先确定各个十神的力量对比（考虑天干通根、地支藏干、月令旺衰、十二长生状态），所处位置（年/月/日/时柱），以及能够发挥作用的程度。\n\n2. **格局判断**：根据十神组合确定格局是否能成立（正格/变格/从格等），如有多种可能的格局，分别评估成立概率。\n\n3. **做功方式分析**：列出原局所有可能的做功方式（如官印相生、食神生财、杀印相生、比劫夺财等），分别评估每种做功方式的成立概率（列出概率百分比），选出最可信的做功方式。\n\n4. **喜用神确定**：根据选定做功方式确定喜用神（喜什么五行、十神），忌神是什么。\n\n5. **大运流年分析**：按照上述步骤重新评估最优做功方式，再论各步大运的喜忌吉凶。当前流年对原局的影响。\n\n6. **格局层次评估**：通过做功的效率和纯粹情况评估命局的整体层次（上等/中等/下等格局）。\n\n请用中文输出，使用Markdown格式，每个步骤用标题分隔（一、二、三、四、五、六）。语言专业但易懂，避免过于绝对的判断。';
      const resp = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey }, body: JSON.stringify({ model: model, messages: [{ role: 'system', content: sp }, { role: 'user', content: prompt }], stream: false, temperature: 0.7, max_tokens: 4096 }), signal: signal });
      if (!resp.ok) { const et = await resp.text().catch(() => ''); throw new Error('HTTP ' + resp.status + (et ? ': ' + et.slice(0, 200) : '')); }
      const json = await resp.json(); return json.choices?.[0]?.message?.content || json.choices?.[0]?.text || '';
    }

    function renderAIResult(text) {
      let html = text.replace(/^#### (.+)$/gm, '<h5>$1</h5>').replace(/^### (.+)$/gm, '<h5>$1</h5>').replace(/^## (.+)$/gm, '<h4>$1</h4>').replace(/^# (.+)$/gm, '<h4>$1</h4>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`(.+?)`/g, '<code>$1</code>').replace(/^- (.+)$/gm, '<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>').replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
      html = '<p>' + html + '</p>'.replace(/<p><\/p>/g, '').replace(/<br><\/li>/g, '</li>').replace(/<\/ul><br>/g, '</ul>').replace(/<br><ul>/g, '<ul>');
      document.getElementById('aiResultInner').innerHTML = html;
    }
