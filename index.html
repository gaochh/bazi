<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八字排盘 - 四柱八字在线测算</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .compact-flow { margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(212,175,55,0.12); display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .compact-flow-pillar { display: flex; align-items: center; gap: 4px; padding: 2px 8px 2px 6px; border: 1px solid rgba(212,175,55,0.12); border-radius: 5px; background: rgba(40,25,15,0.5); font-size: 0.78rem; }
    .compact-flow-pillar .cfp-label { color: #a08870; font-size: 0.6rem; }
    .compact-flow-pillar .cfp-gan { font-weight: 600; }
    .compact-flow-pillar .cfp-zhi { font-weight: 600; }
    .cascade-section { margin: 12px 0 8px; }
    .cascade-section h4 { color: #b89a6a; font-size: 0.78rem; letter-spacing: 1px; margin-bottom: 6px; font-weight: 500; }
    .cascade-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .cascade-chip { display: inline-flex; flex-direction: column; align-items: center; padding: 3px 7px; border-radius: 5px; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(212,175,55,0.08); background: rgba(40,25,15,0.4); color: #b89a6a; min-width: 44px; }
    .cascade-chip:hover { border-color: #d4af37; background: rgba(212,175,55,0.08); }
    .cascade-chip.active { border-color: #d4af37; background: rgba(212,175,55,0.12); color: #d4af37; }
    .cascade-chip .cc-label { font-size: 0.6rem; color: #5a4a3a; }
    .cascade-chip .cc-ganzhi { font-size: 0.8rem; font-weight: 600; color: #e8d5c0; }
    .cascade-chip.active .cc-ganzhi { color: #d4af37; }
    .flow-detail-content { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .flow-detail-item { background: rgba(40,25,15,0.6); border: 1px solid rgba(212,175,55,0.08); border-radius: 8px; padding: 8px 12px; }
    .flow-detail-item .fd-label { color: #a08870; font-size: 0.7rem; }
    .flow-detail-item .fd-value { color: #d4af37; font-weight: 500; font-size: 0.85rem; margin-top: 1px; }
    .fd-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
    .fd-chip { font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; background: rgba(212,175,55,0.06); border: 1px solid rgba(212,175,55,0.08); }
    .ai-loading { display:flex; justify-content:center; gap:8px; margin-bottom:10px; }
    .ai-loading span { width:10px; height:10px; border-radius:50%; background:#d4af37; animation:aiPulse 1.2s ease-in-out infinite; }
    .ai-loading span:nth-child(2) { animation-delay:0.2s; }
    .ai-loading span:nth-child(3) { animation-delay:0.4s; }
    @keyframes aiPulse { 0%,80%,100% { opacity:0.2; transform:scale(0.8); } 40% { opacity:1; transform:scale(1.2); } }
    .ai-result-inner { font-size:0.85rem; line-height:1.8; color:#e8d5c0; }
    .ai-result-inner h4 { color:#d4af37; font-size:0.9rem; margin:16px 0 6px; font-weight:600; letter-spacing:1px; border-bottom:1px solid rgba(212,175,55,0.1); padding-bottom:4px; }
    .ai-result-inner h5 { color:#b89a6a; font-size:0.82rem; margin:10px 0 4px; font-weight:500; }
    .ai-result-inner p { margin:4px 0; }
    .ai-result-inner ul { margin:4px 0; padding-left:18px; }
    .ai-result-inner li { margin:2px 0; list-style-type:disc; color:#c8b894; }
    .ai-result-inner strong { color:#d4af37; }
    .ai-result-inner .highlight { color:#81c784; }
    .ai-result-inner .warning { color:#e57373; }
    .ai-result-inner .table-wrap { overflow-x:auto; margin:8px 0; }
    .ai-result-inner table { width:100%; border-collapse:collapse; font-size:0.78rem; }
    .ai-result-inner td, .ai-result-inner th { border:1px solid rgba(212,175,55,0.12); padding:4px 8px; text-align:center; }
    .ai-result-inner th { background:rgba(212,175,55,0.06); color:#b89a6a; font-weight:500; }
    .ai-error { color:#e57373; font-size:0.85rem; padding:12px; text-align:center; background:rgba(229,115,115,0.06); border-radius:8px; border:1px solid rgba(229,115,115,0.15); }
    @media (max-width: 640px) {
      .flow-detail-content { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>八字排盘</h1>
      <p>四柱八字 · 五行推演 · 命理分析</p>
    </header>

    <div class="form-section">
      <h2>◆ 请输入出生信息</h2>
      <form id="baziForm" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label>年</label>
            <select id="birthYear"></select>
          </div>
          <div class="form-group">
            <label>月</label>
            <select id="birthMonth">
              <option value="1">1 月</option><option value="2">2 月</option>
              <option value="3">3 月</option><option value="4">4 月</option>
              <option value="5">5 月</option><option value="6">6 月</option>
              <option value="7">7 月</option><option value="8">8 月</option>
              <option value="9">9 月</option><option value="10">10 月</option>
              <option value="11">11 月</option><option value="12">12 月</option>
            </select>
          </div>
          <div class="form-group">
            <label>日</label>
            <select id="birthDay"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>时辰</label>
            <select id="birthHour">
              <option value="0">子时 (23:00-00:59)</option>
              <option value="1">丑时 (01:00-02:59)</option>
              <option value="2">寅时 (03:00-04:59)</option>
              <option value="3">卯时 (05:00-06:59)</option>
              <option value="4">辰时 (07:00-08:59)</option>
              <option value="5">巳时 (09:00-10:59)</option>
              <option value="6" selected>午时 (11:00-12:59)</option>
              <option value="7">未时 (13:00-14:59)</option>
              <option value="8">申时 (15:00-16:59)</option>
              <option value="9">酉时 (17:00-18:59)</option>
              <option value="10">戌时 (19:00-20:59)</option>
              <option value="11">亥时 (21:00-22:59)</option>
            </select>
          </div>
          <div class="form-group">
            <label>性别</label>
            <select id="birthGender">
              <option value="男">男</option>
              <option value="女">女</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-submit">开 始 排 盘</button>
      </form>
    </div>

    <div class="result-section" id="resultSection">
      <div class="result-sticky" id="resultSticky">
        <div class="compact-bazi">
          <div class="compact-pillars" id="compactPillars"></div>
          <div class="compact-meta" id="compactMeta"></div>
        </div>
        <div class="compact-flow" id="compactFlow"></div>
      </div>

      <div class="form-section" style="padding-top:4px">
        <h2>◆ 四柱八字</h2>
        <div class="pillars-grid" id="pillarsGrid"></div>

        <div class="info-grid">
          <div class="info-card full-width" id="riGanCard">
            <h3>◆ 日主</h3>
            <div style="text-align:center;padding:8px 0">
              <span class="gan-day-master" id="riGanDisplay"></span>
              <div style="color:#b89a6a;font-size:0.85rem;margin-top:4px" id="riGanDesc"></div>
            </div>
          </div>

          <div class="info-card">
            <h3>◆ 命主信息</h3>
            <div class="info-row"><span class="info-label">生肖</span><span class="info-value" id="shengXiao"></span></div>
            <div class="info-row"><span class="info-label">性别</span><span class="info-value" id="genderDisplay"></span></div>
            <div class="info-row"><span class="info-label">日干五行</span><span class="info-value" id="riWxDisplay"></span></div>
            <div class="info-row"><span class="info-label">日支藏干</span><span class="info-value" id="cangGanDisplay"></span></div>
          </div>

          <div class="info-card">
            <h3>◆ 十神</h3>
            <div class="info-row"><span class="info-label">年柱</span><span class="info-value" id="ssYear"></span></div>
            <div class="info-row"><span class="info-label">月柱</span><span class="info-value" id="ssMonth"></span></div>
            <div class="info-row"><span class="info-label">日柱</span><span class="info-value" id="ssDay">日主</span></div>
            <div class="info-row"><span class="info-label">时柱</span><span class="info-value" id="ssHour"></span></div>
          </div>

          <div class="info-card">
            <h3>◆ 十二长生</h3>
            <div class="info-row"><span class="info-label">年柱</span><span class="info-value" id="csYear"></span></div>
            <div class="info-row"><span class="info-label">月柱</span><span class="info-value" id="csMonth"></span></div>
            <div class="info-row"><span class="info-label">日柱</span><span class="info-value" id="csDay"></span></div>
            <div class="info-row"><span class="info-label">时柱</span><span class="info-value" id="csHour"></span></div>
          </div>

          <div class="info-card">
            <h3>◆ 纳音五行</h3>
            <div class="info-row"><span class="info-label">年柱</span><span class="info-value" id="nayinYear"></span></div>
            <div class="info-row"><span class="info-label">月柱</span><span class="info-value" id="nayinMonth"></span></div>
            <div class="info-row"><span class="info-label">日柱</span><span class="info-value" id="nayinDay"></span></div>
            <div class="info-row"><span class="info-label">时柱</span><span class="info-value" id="nayinHour"></span></div>
          </div>

          <div class="info-card full-width">
            <h3>◆ 五行分布</h3>
            <div class="wuxing-bar" id="wuxingBar"></div>
            <div class="wuxing-bar-total" id="wuxingTags"></div>
          </div>

          <div class="info-card full-width" id="shenshaCard">
            <h3>◆ 神煞</h3>
            <div class="shensha-grid" id="shenshaGrid"></div>
          </div>

          <div class="info-card full-width" id="dayunCard">
            <h3>◆ 大运排布 <span style="color:#5a4a3a;font-weight:400;font-size:0.72rem">（点击大运展开流年 · 逐级深入流月/流日/流时）</span></h3>
            <div id="dayunInfo" style="margin-bottom:12px;font-size:0.88rem;color:#b89a6a"></div>
            <div class="dayun-table-wrap">
              <table class="dayun-table" id="dayunTable"></table>
            </div>
          </div>

          <div class="info-card full-width" id="flowDetailSection" style="display:none">
            <h3>◆ 流时详览 <span style="color:#5a4a3a;font-weight:400;font-size:0.72rem" id="flowDetailSubtitle"></span></h3>
            <div id="flowDetailContent"></div>
            <div id="flowCascade"></div>
          </div>

          <div class="info-card full-width" id="aiCard">
            <h3>◆ AI 智能解盘</h3>
            <div id="aiConfig" style="margin-bottom:12px;font-size:0.78rem;color:#b89a6a">
              <div class="form-row" style="align-items:end">
                <div class="form-group" style="flex:2">
                  <label>API Key</label>
                  <input type="password" id="aiApiKey" placeholder="sk-..." style="font-size:0.78rem;padding:6px 8px">
                </div>
                <div class="form-group" style="flex:1">
                  <label>接口地址</label>
                  <select id="aiEndpoint" style="font-size:0.78rem;padding:6px 8px">
                    <option value="https://openrouter.ai/api/v1/chat/completions">OpenRouter</option>
                    <option value="https://api.openai.com/v1/chat/completions">OpenAI</option>
                  </select>
                </div>
                <div class="form-group" style="flex:1">
                  <label>模型</label>
                  <input type="text" id="aiModel" value="google/gemini-2.0-flash-exp:free" placeholder="模型名" style="font-size:0.78rem;padding:6px 8px">
                </div>
              </div>
              <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
                <button type="button" class="btn-submit" id="aiAnalyzeBtn" style="padding:8px 20px;font-size:0.85rem;letter-spacing:2px;margin-top:0;flex:1;min-width:120px">开始AI解盘</button>
                <button type="button" id="aiSaveKeyBtn" style="padding:8px 14px;font-size:0.78rem;background:rgba(212,175,55,0.1);color:#b89a6a;border:1px solid rgba(212,175,55,0.2);border-radius:6px;cursor:pointer;font-family:inherit">保存配置</button>
              </div>
            </div>
            <div id="aiStatus" style="display:none;text-align:center;padding:20px 0;color:#a08870;font-size:0.85rem">
              <div class="ai-loading"><span></span><span></span><span></span></div>
              <div id="aiStatusText">AI 正在分析···</div>
            </div>
            <div id="aiResult" style="display:none">
              <div class="ai-result-inner" id="aiResultInner"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">仅供学习参考 · 传统文化研究</div>
  </div>

  <script src="js/bazi.js"></script>
  <script>
    const MONTH_NAMES = ['寅月','卯月','辰月','巳月','午月','未月','申月','酉月','戌月','亥月','子月','丑月'];
    const HOUR_NAMES = ['子时','丑时','寅时','卯时','辰时','巳时','午时','未时','申时','酉时','戌时','亥时'];

    let lastResult = null;
    let originalShenshaHTML = '';
    let flow = { year: null, monthIdx: null, day: null, hourIdx: null };

    const defaultDate = getDefaultDate();

    function calcLiuYueByYear(yearGan) {
      const ysi = TIAN_GAN.indexOf(yearGan);
      const arr = [];
      for (let i = 0; i < 12; i++) {
        const s = (ysi % 5 * 2 + i + 1) % 10;
        const b = (i + 2) % 12;
        arr.push({ idx: i, gan: TIAN_GAN[s], zhi: DI_ZHI[b], label: MONTH_NAMES[i] });
      }
      return arr;
    }

    function calcLiuRiByMonth(yr, mo) {
      const days = new Date(yr, mo, 0).getDate();
      const arr = [];
      for (let d = 1; d <= days; d++) {
        const dp = calcDayPillar(yr, mo, d);
        arr.push({ day: d, gan: dp.stem, zhi: dp.branch });
      }
      return arr;
    }

    function calcLiuShiByDay(dayGan) {
      const dsi = TIAN_GAN.indexOf(dayGan);
      const arr = [];
      for (let i = 0; i < 12; i++) {
        const s = (dsi % 5 * 2 + i) % 10;
        arr.push({ idx: i, gan: TIAN_GAN[s], zhi: DI_ZHI[i], label: HOUR_NAMES[i] });
      }
      return arr;
    }

    function calcSimpleShensha(gan, zhi) {
      const o = {};
      const gr = calcTianYiGuiRen(gan).slice(0, 2);
      if (gr.length) o['天乙贵人'] = gr;
      const wc = calcWenChang(gan); if (wc) o['文昌贵人'] = wc;
      const ym = calcYiMa(zhi); if (ym) o['驿马'] = ym;
      const th = calcTaoHua(zhi); if (th) o['桃花'] = th;
      const hg = calcHuaGai(zhi); if (hg) o['华盖'] = hg;
      return o;
    }

    function mergeObj(t, s) {
      for (const [k, v] of Object.entries(s)) {
        if (t[k]) {
          const e = Array.isArray(t[k]) ? t[k] : [t[k]];
          const a = Array.isArray(v) ? v : [v];
          a.forEach(i => { if (!e.includes(i)) e.push(i); });
          t[k] = e;
        } else t[k] = v;
      }
    }

    function getNianZhiIndex(year, month, day) {
      const md = month * 100 + day;
      const y = md < 204 ? year - 1 : year;
      return ((y - 4) % 12 + 12) % 12;
    }

    // ── Init ──
    (function initForm() {
      const ys = document.getElementById('birthYear');
      for (let y = 1900; y <= 2100; y++) {
        const o = document.createElement('option');
        o.value = y; o.textContent = y + ' 年';
        if (y === defaultDate.year) o.selected = true;
        ys.appendChild(o);
      }
      document.getElementById('birthMonth').value = defaultDate.month;
      const ds = document.getElementById('birthDay');
      for (let d = 1; d <= 31; d++) {
        const o = document.createElement('option');
        o.value = d; o.textContent = d + ' 日';
        if (d === defaultDate.day) o.selected = true;
        ds.appendChild(o);
      }
      document.getElementById('birthHour').value = getHourBranchIdx(defaultDate.hour, defaultDate.minute);
    })();

    document.getElementById('baziForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const year = parseInt(document.getElementById('birthYear').value);
      const month = parseInt(document.getElementById('birthMonth').value);
      const day = parseInt(document.getElementById('birthDay').value);
      const hourBranch = parseInt(document.getElementById('birthHour').value);
      const gender = document.getElementById('birthGender').value;
      const hourMap = { 0: [23, 0], 1: [1, 0], 2: [3, 0], 3: [5, 0], 4: [7, 0], 5: [9, 0], 6: [11, 0], 7: [13, 0], 8: [15, 0], 9: [17, 0], 10: [19, 0], 11: [21, 0] };
      const [hour, minute] = hourMap[hourBranch];
      const result = calcBazi(year, month, day, hour, minute, gender);
      lastResult = result;
      flow = { year: null, monthIdx: null, day: null, hourIdx: null };
      displayResult(result);
    });

    // ── Display ──
    function displayResult(r) {
      // Compact header
      const cp = document.getElementById('compactPillars');
      cp.innerHTML = '';
      r.pillars.forEach(p => {
        const wxG = WU_XING_TG[p.gan], wxZ = WU_XING_DZ[p.zhi];
        const d = document.createElement('div');
        d.className = 'compact-pillar';
        d.innerHTML = `<div class="cp-name">${p.name}</div><div class="cp-gan" style="color:${WU_XING_COLOR[wxG]}">${p.gan}</div><div class="cp-zhi" style="color:${WU_XING_COLOR[wxZ]}">${p.zhi}</div>`;
        cp.appendChild(d);
      });
      document.getElementById('compactMeta').innerHTML = `<span>日主：<strong>${r.riGan} · ${r.riWx} · ${r.riYinYang}</strong></span><span>生肖：<strong>${r.shengXiao}</strong></span><span>${r.gender}</span>`;
      document.getElementById('compactFlow').innerHTML = '';

      // Pillar cards
      const grid = document.getElementById('pillarsGrid');
      grid.innerHTML = '';
      r.pillars.forEach((p, i) => {
        const wxG = WU_XING_TG[p.gan], wxZ = WU_XING_DZ[p.zhi];
        const card = document.createElement('div');
        card.className = 'pillar-card';
        card.innerHTML = `<div class="pillar-name">${p.name}</div><div class="pillar-gan">${p.gan}</div><div class="pillar-zhi">${p.zhi}</div><div><span class="pillar-wx" style="background:${WU_XING_COLOR[wxG]}">${wxG}</span><span class="pillar-wx" style="background:${WU_XING_COLOR[wxZ]}">${wxZ}</span></div><div class="pillar-nayin">${r.nayin[i]}</div><div class="pillar-detail"><span>${r.yinyang[i].gan}</span>·<span>${r.yinyang[i].zhi}</span></div><div class="pillar-changsheng">${r.changSheng[i]}</div>`;
        grid.appendChild(card);
      });

      document.getElementById('riGanDisplay').textContent = r.riGan + ' (' + r.riWx + ' · ' + r.riYinYang + ')';
      document.getElementById('riGanDesc').textContent = '日主为' + r.riYinYang + r.riWx + ' · 生于' + r.riZhi + '日 · ' + r.hourRange + '出生';
      document.getElementById('shengXiao').textContent = r.shengXiao;
      document.getElementById('genderDisplay').textContent = r.gender;
      document.getElementById('riWxDisplay').textContent = r.riWx;
      document.getElementById('cangGanDisplay').textContent = r.cangGan[2].join('、');
      document.getElementById('ssYear').textContent = r.shiShen[0];
      document.getElementById('ssMonth').textContent = r.shiShen[1];
      document.getElementById('ssDay').textContent = '日主';
      document.getElementById('ssHour').textContent = r.shiShen[3];
      document.getElementById('csYear').textContent = r.changSheng[0];
      document.getElementById('csMonth').textContent = r.changSheng[1];
      document.getElementById('csDay').textContent = r.changSheng[2];
      document.getElementById('csHour').textContent = r.changSheng[3];
      document.getElementById('nayinYear').textContent = r.nayin[0];
      document.getElementById('nayinMonth').textContent = r.nayin[1];
      document.getElementById('nayinDay').textContent = r.nayin[2];
      document.getElementById('nayinHour').textContent = r.nayin[3];

      // 五行
      const bar = document.getElementById('wuxingBar');
      bar.innerHTML = '';
      ['木','火','土','金','水'].forEach(wx => {
        if (r.wuxingCount[wx] > 0) {
          const seg = document.createElement('div');
          seg.className = 'wuxing-bar-seg';
          seg.style.width = r.wuxingPercent[wx] + '%';
          seg.style.background = WU_XING_COLOR[wx];
          seg.textContent = r.wuxingPercent[wx] >= 10 ? wx : '';
          bar.appendChild(seg);
        }
      });
      const tags = document.getElementById('wuxingTags');
      tags.innerHTML = '';
      ['木','火','土','金','水'].forEach(wx => {
        const tag = document.createElement('span');
        tag.className = 'wuxing-tag';
        tag.style.background = WU_XING_COLOR[wx] + '33';
        tag.style.color = WU_XING_COLOR[wx];
        tag.innerHTML = wx + ' ' + r.wuxingCount[wx] + ' (' + r.wuxingPercent[wx] + '%)';
        tags.appendChild(tag);
      });
      if (r.missingWx.length > 0) {
        const mt = document.createElement('span');
        mt.className = 'wuxing-tag';
        mt.style.background = '#555';
        mt.style.color = '#ccc';
        mt.textContent = '缺: ' + r.missingWx.join('、');
        tags.appendChild(mt);
      }

      // 神煞
      buildShensha(r.shenSha);
      originalShenshaHTML = document.getElementById('shenshaGrid').innerHTML;

      // 大运
      const dy = r.daYun;
      document.getElementById('dayunInfo').innerHTML = '起运年龄：<strong>' + dy.startAge + ' 岁</strong> &nbsp;·&nbsp; 排法：<strong>' + (dy.shunPai ? '顺排' : '逆排') + '</strong>';
      const dt = document.getElementById('dayunTable');
      dt.innerHTML = '';
      const th = document.createElement('thead');
      th.innerHTML = '<tr><th>大运</th><th>年龄</th><th>天干</th><th>地支</th><th>五行</th><th>纳音</th></tr>';
      dt.appendChild(th);
      const tb = document.createElement('tbody');
      dy.pillars.forEach((p, i) => {
        const tr = document.createElement('tr');
        tr.dataset.dayunIndex = i;
        tr.innerHTML = '<td>' + p.index + '</td><td>' + p.ageFrom + '-' + p.ageTo + '岁</td><td style="color:' + WU_XING_COLOR[p.wxG] + ';font-weight:500">' + p.gan + '</td><td style="color:' + WU_XING_COLOR[p.wxZ] + ';font-weight:500">' + p.zhi + '</td><td><span class="pillar-wx" style="background:' + WU_XING_COLOR[p.wxG] + '">' + p.wxG + '</span><span class="pillar-wx" style="background:' + WU_XING_COLOR[p.wxZ] + '">' + p.wxZ + '</span></td><td style="color:#a08870">' + p.naYin + '</td>';
        tb.appendChild(tr);
      });
      dt.appendChild(tb);

      document.getElementById('flowDetailSection').style.display = 'none';
      document.getElementById('resultSection').classList.add('visible');
      document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function buildShensha(sha) {
      const sg = document.getElementById('shenshaGrid');
      sg.innerHTML = '';
      const entries = Object.entries(sha);
      if (!entries.length) {
        sg.innerHTML = '<div style="color:#a08870;font-size:0.85rem;text-align:center;padding:8px 0">无显著神煞</div>';
        return;
      }
      entries.forEach(([name, val]) => {
        const d = document.createElement('div');
        d.className = 'shensha-item';
        const v = Array.isArray(val) ? val.join('、') : val;
        d.innerHTML = '<span class="shensha-name">' + name + '</span><span class="shensha-val">' + v + '</span>';
        sg.appendChild(d);
      });
    }

    // ── 大运 Click ──
    document.getElementById('dayunTable').addEventListener('click', function(e) {
      const row = e.target.closest('tr[data-dayun-index]');
      if (!row || row.classList.contains('dayun-expand-row')) return;
      toggleDayunFlow(parseInt(row.dataset.dayunIndex));
    });

    let expandedDayunIdx = -1;

    function toggleDayunFlow(idx) {
      const exist = document.querySelector('.dayun-expand-row');
      if (exist) {
        exist.remove();
        document.querySelectorAll('.dayun-table tbody tr').forEach(r => r.classList.remove('dayun-active'));
        if (expandedDayunIdx === idx) {
          expandedDayunIdx = -1;
          clearFlow();
          return;
        }
      }
      expandedDayunIdx = idx;
      const row = document.querySelector('.dayun-table tbody tr[data-dayun-index="' + idx + '"]');
      if (!row) return;
      row.classList.add('dayun-active');

      const dy = lastResult.daYun.pillars[idx];
      const birthYear = parseInt(document.getElementById('birthYear').value);
      const startYear = birthYear + dy.ageFrom;

      let html = '';
      for (let i = 0; i < 10; i++) {
        const y = startYear + i;
        const gi = ((y - 4) % 10 + 10) % 10;
        const bi = ((y - 4) % 12 + 12) % 12;
        const act = flow.year === y ? ' active' : '';
        html += '<span class="flow-year-chip' + act + '" data-flow="year" data-year="' + y + '"><span class="fy-year">' + y + '</span><span class="fy-ganzhi">' + TIAN_GAN[gi] + DI_ZHI[bi] + '</span></span>';
      }
      const er = document.createElement('tr');
      er.className = 'dayun-expand-row';
      er.innerHTML = '<td colspan="6"><div class="dayun-flow-wrap"><div style="color:#a08870;font-size:0.72rem;margin-bottom:4px"><span class="cascade-label">流年</span> — 点击进入流月/流日/流时</div><div class="dayun-flow-years">' + html + '</div></div></td>';
      row.after(er);
    }

    // ── Flow Cascade Click Delegation ──
    document.addEventListener('click', function(e) {
      const chip = e.target.closest('[data-flow]');
      if (!chip) return;
      const type = chip.dataset.flow;
      if (!lastResult) return;

      if (type === 'year') selectFlowYear(parseInt(chip.dataset.year));
      else if (type === 'month') selectFlowMonth(parseInt(chip.dataset.monthIdx));
      else if (type === 'day') selectFlowDay(parseInt(chip.dataset.day));
      else if (type === 'hour') selectFlowHour(parseInt(chip.dataset.hourIdx));
    });

    function clearFlow() {
      flow = { year: null, monthIdx: null, day: null, hourIdx: null };
      document.getElementById('flowDetailSection').style.display = 'none';
      document.getElementById('compactFlow').innerHTML = '';
      document.getElementById('shenshaGrid').innerHTML = originalShenshaHTML;
      document.querySelectorAll('.dayun-table tbody tr').forEach(r => r.classList.remove('dayun-active'));
      document.querySelectorAll('.flow-year-chip').forEach(c => c.classList.remove('active'));
    }

    // ── Select Flow Year ──
    function selectFlowYear(year) {
      flow = { year: year, monthIdx: null, day: null, hourIdx: null };
      document.querySelectorAll('.flow-year-chip').forEach(c => { c.classList.toggle('active', parseInt(c.dataset.year) === year); });

      const r = lastResult;
      const by = parseInt(document.getElementById('birthYear').value);
      const bm = parseInt(document.getElementById('birthMonth').value);
      const bd = parseInt(document.getElementById('birthDay').value);
      const nianZhi = DI_ZHI[getNianZhiIndex(by, bm, bd)];
      const lr = calcLiuNian(year, r.riGan, TIAN_GAN.indexOf(r.riGan), r.pillars, nianZhi, r.pillars[1].zhi);

      // Header
      updateFlowHeader([{ label: '流年', gan: lr.gan, zhi: lr.zhi, wxG: lr.wxG, wxZ: lr.wxZ }]);

      // Detail cards
      const detail = buildFlowDetailCards(lr, r.riGan);
      document.getElementById('flowDetailContent').innerHTML = detail;
      document.getElementById('flowDetailSubtitle').textContent = '· ' + year + '年 ' + lr.gan + lr.zhi;

      // 流月 cascade
      const ly = calcLiuYueByYear(lr.gan);
      let mHtml = '';
      ly.forEach(m => {
        const act = flow.monthIdx === m.idx ? ' active' : '';
        mHtml += '<span class="cascade-chip' + act + '" data-flow="month" data-month-idx="' + m.idx + '"><span class="cc-label">' + m.label + '</span><span class="cc-ganzhi">' + m.gan + m.zhi + '</span></span>';
      });
      document.getElementById('flowCascade').innerHTML = '<div class="cascade-section"><h4>◆ 流月</h4><div class="cascade-grid">' + mHtml + '</div></div>';

      document.getElementById('flowDetailSection').style.display = 'block';
      updateShensha(lr.gan, lr.zhi, lr.shenSha);
    }

    // ── Select Flow Month ──
    function selectFlowMonth(monthIdx) {
      flow.monthIdx = monthIdx;
      flow.day = null;
      flow.hourIdx = null;

      document.querySelectorAll('[data-flow="month"]').forEach(c => { c.classList.toggle('active', parseInt(c.dataset.monthIdx) === monthIdx); });

      const r = lastResult;
      const by = parseInt(document.getElementById('birthYear').value);
      const bm = parseInt(document.getElementById('birthMonth').value);
      const bd = parseInt(document.getElementById('birthDay').value);
      const nianZhi = DI_ZHI[getNianZhiIndex(by, bm, bd)];
      const lr = calcLiuNian(flow.year, r.riGan, TIAN_GAN.indexOf(r.riGan), r.pillars, nianZhi, r.pillars[1].zhi);

      // Month stem-branch
      const ysi = TIAN_GAN.indexOf(lr.gan);
      const ms = (ysi % 5 * 2 + monthIdx + 1) % 10;
      const mb = (monthIdx + 2) % 12;
      const mGan = TIAN_GAN[ms], mZhi = DI_ZHI[mb];
      const mwxG = WU_XING_TG[mGan], mwxZ = WU_XING_DZ[mZhi];

      // Header
      updateFlowHeader([
        { label: '流年', gan: lr.gan, zhi: lr.zhi, wxG: lr.wxG, wxZ: lr.wxZ },
        { label: '流月', gan: mGan, zhi: mZhi, wxG: mwxG, wxZ: mwxZ }
      ]);

      // Detail
      const mSs = calcShiShen(r.riGan, mGan);
      const mCs = calcChangSheng(r.riGan, mb);
      const mNy = calcNaYin(mGan, mZhi);
      const detail = buildFlowDetailCards(lr, r.riGan);
      document.getElementById('flowDetailContent').innerHTML = detail + '<div style="grid-column:1/-1;border-top:1px solid rgba(212,175,55,0.1);padding-top:8px;margin-top:2px">' + buildFlowMiniCards('流月', monthIdx, mGan, mZhi, mwxG, mwxZ, mNy, mSs, mCs, r.riGan, flow.year, MONTH_NAMES[monthIdx]) + '</div>';
      document.getElementById('flowDetailSubtitle').textContent = '· ' + flow.year + '年 ' + lr.gan + lr.zhi + ' → ' + MONTH_NAMES[monthIdx] + ' ' + mGan + mZhi;

      // 流日 cascade
      const y = flow.year;
      const m = monthIdx + 2; // monthIdx 0=寅月(2月), 1=卯月(3月), etc
      const calMonth = m > 12 ? m - 12 : m;
      // Find the actual calendar month that corresponds to this lunar month
      // Approximate: 寅月≈2月, 卯月≈3月, etc.
      // For simplicity, use the approximate mapping: monthIdx 0->2, 1->3, ... 11->1
      const calM = monthIdx + 2 <= 12 ? monthIdx + 2 : monthIdx + 2 - 12;
      const calY = monthIdx + 2 <= 12 ? y : y + 1;
      const days = calcLiuRiByMonth(calY, calM);
      let dHtml = '';
      days.forEach(d => {
        const act = flow.day === d.day ? ' active' : '';
        dHtml += '<span class="cascade-chip' + act + '" data-flow="day" data-day="' + d.day + '"><span class="cc-label">' + d.day + '日</span><span class="cc-ganzhi">' + d.gan + d.zhi + '</span></span>';
      });
      document.getElementById('flowCascade').innerHTML =
        '<div class="cascade-section"><h4>◆ 流月</h4><div class="cascade-grid">' +
        calcLiuYueByYear(lr.gan).map(m => '<span class="cascade-chip' + (flow.monthIdx === m.idx ? ' active' : '') + '" data-flow="month" data-month-idx="' + m.idx + '"><span class="cc-label">' + m.label + '</span><span class="cc-ganzhi">' + m.gan + m.zhi + '</span></span>').join('') +
        '</div></div><div class="cascade-section"><h4>◆ 流日</h4><div class="cascade-grid">' + dHtml + '</div></div>';

      updateShenshaFromGanZhi(mGan, mZhi);
    }

    // ── Select Flow Day ──
    function selectFlowDay(day) {
      flow.day = day;
      flow.hourIdx = null;

      document.querySelectorAll('[data-flow="day"]').forEach(c => { c.classList.toggle('active', parseInt(c.dataset.day) === day); });

      const r = lastResult;
      const by = parseInt(document.getElementById('birthYear').value);
      const bm = parseInt(document.getElementById('birthMonth').value);
      const bd = parseInt(document.getElementById('birthDay').value);
      const nianZhi = DI_ZHI[getNianZhiIndex(by, bm, bd)];
      const lr = calcLiuNian(flow.year, r.riGan, TIAN_GAN.indexOf(r.riGan), r.pillars, nianZhi, r.pillars[1].zhi);

      const calM = flow.monthIdx + 2 <= 12 ? flow.monthIdx + 2 : flow.monthIdx + 2 - 12;
      const calY = flow.monthIdx + 2 <= 12 ? flow.year : flow.year + 1;
      const dp = calcDayPillar(calY, calM, day);
      const dGan = dp.stem, dZhi = dp.branch;
      const dwxG = WU_XING_TG[dGan], dwxZ = WU_XING_DZ[dZhi];

      const ysi = TIAN_GAN.indexOf(lr.gan);
      const ms = (ysi % 5 * 2 + flow.monthIdx + 1) % 10;
      const mGan = TIAN_GAN[ms], mZhi = DI_ZHI[(flow.monthIdx + 2) % 12];

      updateFlowHeader([
        { label: '流年', gan: lr.gan, zhi: lr.zhi, wxG: lr.wxG, wxZ: lr.wxZ },
        { label: '流月', gan: mGan, zhi: mZhi, wxG: WU_XING_TG[mGan], wxZ: WU_XING_DZ[mZhi] },
        { label: '流日', gan: dGan, zhi: dZhi, wxG: dwxG, wxZ: dwxZ }
      ]);

      const dSs = calcShiShen(r.riGan, dGan);
      const dCs = calcChangSheng(r.riGan, DI_ZHI.indexOf(dZhi));
      const dNy = calcNaYin(dGan, dZhi);

      const monthIdx = flow.monthIdx;
      const mSs = calcShiShen(r.riGan, mGan);
      const mCs = calcChangSheng(r.riGan, (monthIdx + 2) % 12);
      const mNy = calcNaYin(mGan, mZhi);

      let detail = buildFlowDetailCards(lr, r.riGan);
      detail += '<div style="grid-column:1/-1;border-top:1px solid rgba(212,175,55,0.1);padding-top:8px;margin-top:2px">';
      detail += buildFlowMiniCards('流月', monthIdx, mGan, mZhi, WU_XING_TG[mGan], WU_XING_DZ[mZhi], mNy, mSs, mCs, r.riGan, flow.year, MONTH_NAMES[monthIdx]);
      detail += '</div>';
      detail += '<div style="grid-column:1/-1">' + buildFlowMiniCards('流日', day, dGan, dZhi, dwxG, dwxZ, dNy, dSs, dCs, r.riGan, calY + '-' + calM + '-' + day, day + '日') + '</div>';

      document.getElementById('flowDetailContent').innerHTML = detail;
      document.getElementById('flowDetailSubtitle').textContent = '· ' + flow.year + '年 ' + lr.gan + lr.zhi + ' → ' + MONTH_NAMES[flow.monthIdx] + ' ' + mGan + mZhi + ' → ' + day + '日 ' + dGan + dZhi;

      // 流时 cascade
      const hours = calcLiuShiByDay(dGan);
      let hHtml = '';
      hours.forEach(h => {
        const act = flow.hourIdx === h.idx ? ' active' : '';
        hHtml += '<span class="cascade-chip' + act + '" data-flow="hour" data-hour-idx="' + h.idx + '"><span class="cc-label">' + h.label + '</span><span class="cc-ganzhi">' + h.gan + h.zhi + '</span></span>';
      });
      document.getElementById('flowCascade').innerHTML =
        '<div class="cascade-section"><h4>◆ 流月</h4><div class="cascade-grid">' +
        calcLiuYueByYear(lr.gan).map(m => '<span class="cascade-chip' + (flow.monthIdx === m.idx ? ' active' : '') + '" data-flow="month" data-month-idx="' + m.idx + '"><span class="cc-label">' + m.label + '</span><span class="cc-ganzhi">' + m.gan + m.zhi + '</span></span>').join('') +
        '</div></div><div class="cascade-section"><h4>◆ 流日</h4><div class="cascade-grid">' +
        calcLiuRiByMonth(calY, calM).map(d => '<span class="cascade-chip' + (flow.day === d.day ? ' active' : '') + '" data-flow="day" data-day="' + d.day + '"><span class="cc-label">' + d.day + '日</span><span class="cc-ganzhi">' + d.gan + d.zhi + '</span></span>').join('') +
        '</div></div><div class="cascade-section"><h4>◆ 流时</h4><div class="cascade-grid">' + hHtml + '</div></div>';

      updateShenshaFromGanZhi(dGan, dZhi);
    }

    // ── Select Flow Hour ──
    function selectFlowHour(hourIdx) {
      flow.hourIdx = hourIdx;

      document.querySelectorAll('[data-flow="hour"]').forEach(c => { c.classList.toggle('active', parseInt(c.dataset.hourIdx) === hourIdx); });

      const r = lastResult;
      const by = parseInt(document.getElementById('birthYear').value);
      const bm = parseInt(document.getElementById('birthMonth').value);
      const bd = parseInt(document.getElementById('birthDay').value);
      const nianZhi = DI_ZHI[getNianZhiIndex(by, bm, bd)];
      const lr = calcLiuNian(flow.year, r.riGan, TIAN_GAN.indexOf(r.riGan), r.pillars, nianZhi, r.pillars[1].zhi);

      const calM = flow.monthIdx + 2 <= 12 ? flow.monthIdx + 2 : flow.monthIdx + 2 - 12;
      const calY = flow.monthIdx + 2 <= 12 ? flow.year : flow.year + 1;
      const dp = calcDayPillar(calY, calM, flow.day);
      const hours = calcLiuShiByDay(dp.stem);
      const h = hours[hourIdx];
      const hGan = h.gan, hZhi = h.zhi;
      const hwxG = WU_XING_TG[hGan], hwxZ = WU_XING_DZ[hZhi];

      const ysi = TIAN_GAN.indexOf(lr.gan);
      const ms = (ysi % 5 * 2 + flow.monthIdx + 1) % 10;
      const mGan = TIAN_GAN[ms], mZhi = DI_ZHI[(flow.monthIdx + 2) % 12];

      updateFlowHeader([
        { label: '流年', gan: lr.gan, zhi: lr.zhi, wxG: lr.wxG, wxZ: lr.wxZ },
        { label: '流月', gan: mGan, zhi: mZhi, wxG: WU_XING_TG[mGan], wxZ: WU_XING_DZ[mZhi] },
        { label: '流日', gan: dp.stem, zhi: dp.branch, wxG: WU_XING_TG[dp.stem], wxZ: WU_XING_DZ[dp.branch] },
        { label: '流时', gan: hGan, zhi: hZhi, wxG: hwxG, wxZ: hwxZ }
      ]);

      const hSs = calcShiShen(r.riGan, hGan);
      const hCs = calcChangSheng(r.riGan, hourIdx);
      const hNy = calcNaYin(hGan, hZhi);

      const dSs = calcShiShen(r.riGan, dp.stem);
      const dCs = calcChangSheng(r.riGan, DI_ZHI.indexOf(dp.branch));
      const dNy = calcNaYin(dp.stem, dp.branch);

      let detail = buildFlowDetailCards(lr, r.riGan);
      detail += '<div style="grid-column:1/-1;border-top:1px solid rgba(212,175,55,0.1);padding-top:8px;margin-top:2px">' +
        buildFlowMiniCards('流月', flow.monthIdx, mGan, mZhi, WU_XING_TG[mGan], WU_XING_DZ[mZhi], calcNaYin(mGan, mZhi), calcShiShen(r.riGan, mGan), calcChangSheng(r.riGan, (flow.monthIdx + 2) % 12), r.riGan, flow.year, MONTH_NAMES[flow.monthIdx]) +
        '</div><div style="grid-column:1/-1">' +
        buildFlowMiniCards('流日', flow.day, dp.stem, dp.branch, WU_XING_TG[dp.stem], WU_XING_DZ[dp.branch], dNy, dSs, dCs, r.riGan, calY + '-' + calM + '-' + flow.day, flow.day + '日') +
        '</div><div style="grid-column:1/-1">' +
        buildFlowMiniCards('流时', hourIdx, hGan, hZhi, hwxG, hwxZ, hNy, hSs, hCs, r.riGan, h.label, h.label) +
        '</div>';

      document.getElementById('flowDetailContent').innerHTML = detail;
      document.getElementById('flowDetailSubtitle').textContent = '· ' + flow.year + '年 ' + lr.gan + lr.zhi + ' → ' + MONTH_NAMES[flow.monthIdx] + ' ' + mGan + mZhi + ' → ' + flow.day + '日 ' + dp.stem + dp.branch + ' → ' + HOUR_NAMES[hourIdx] + ' ' + hGan + hZhi;

      // Keep cascade sections
      const ly = calcLiuYueByYear(lr.gan);
      document.getElementById('flowCascade').innerHTML =
        '<div class="cascade-section"><h4>◆ 流月</h4><div class="cascade-grid">' +
        ly.map(m => '<span class="cascade-chip' + (flow.monthIdx === m.idx ? ' active' : '') + '" data-flow="month" data-month-idx="' + m.idx + '"><span class="cc-label">' + m.label + '</span><span class="cc-ganzhi">' + m.gan + m.zhi + '</span></span>').join('') +
        '</div></div><div class="cascade-section"><h4>◆ 流日</h4><div class="cascade-grid">' +
        calcLiuRiByMonth(calY, calM).map(d => '<span class="cascade-chip' + (flow.day === d.day ? ' active' : '') + '" data-flow="day" data-day="' + d.day + '"><span class="cc-label">' + d.day + '日</span><span class="cc-ganzhi">' + d.gan + d.zhi + '</span></span>').join('') +
        '</div></div><div class="cascade-section"><h4>◆ 流时</h4><div class="cascade-grid">' +
        hours.map(h => '<span class="cascade-chip' + (flow.hourIdx === h.idx ? ' active' : '') + '" data-flow="hour" data-hour-idx="' + h.idx + '"><span class="cc-label">' + h.label + '</span><span class="cc-ganzhi">' + h.gan + h.zhi + '</span></span>').join('') +
        '</div></div>';

      updateShenshaFromGanZhi(hGan, hZhi);
    }

    // ── Helpers ──
    function updateFlowHeader(items) {
      let html = '';
      items.forEach(item => {
        html += '<div class="compact-flow-pillar"><span class="cfp-label">' + item.label + '</span> <span class="cfp-gan" style="color:' + WU_XING_COLOR[item.wxG] + '">' + item.gan + '</span><span class="cfp-zhi" style="color:' + WU_XING_COLOR[item.wxZ] + '">' + item.zhi + '</span></div>';
      });
      document.getElementById('compactFlow').innerHTML = html;
    }

    function buildFlowDetailCards(lr, riGan) {
      const bg = WU_XING_COLOR[lr.wxG] || '#888';
      return '<div class="flow-detail-content">' +
        '<div class="flow-detail-item"><div class="fd-label">流年干支</div><div class="fd-value" style="color:' + bg + ';font-size:1.1rem">' + lr.gan + lr.zhi + '</div><div style="color:#a08870;font-size:0.72rem">' + lr.year + '年 · ' + lr.shengXiao + '年</div></div>' +
        '<div class="flow-detail-item"><div class="fd-label">五行纳音</div><div class="fd-value">' + lr.wxG + lr.wxZ + '</div><div style="color:#a08870;font-size:0.72rem">' + lr.naYin + '</div></div>' +
        '<div class="flow-detail-item"><div class="fd-label">对日主十神</div><div class="fd-value">' + lr.shiShen + '</div><div style="color:#a08870;font-size:0.72rem">日主' + riGan + '遇' + lr.gan + '</div></div>' +
        '<div class="flow-detail-item"><div class="fd-label">十二长生</div><div class="fd-value">' + lr.changSheng + '</div><div style="color:#a08870;font-size:0.72rem">日主' + riGan + '遇' + lr.zhi + '</div></div>' +
        '<div class="flow-detail-item"><div class="fd-label">流年神煞</div><div class="fd-chips">' +
        buildShenshaChips(lr.gan, lr.zhi, lr.shenSha) +
        '</div></div>' +
        '<div class="flow-detail-item"><div class="fd-label">与四柱关系</div><div class="fd-chips">' +
        (lr.relations || []).map(rel => {
          const bad = ['六冲', '六害', '三刑', '相刑', '自刑'].includes(rel.relation);
          const good = ['六合', '三合', '半合'].includes(rel.relation);
          const clr = bad ? '#e57373' : good ? '#81c784' : '#d4af37';
          return '<span class="fd-chip"><span style="color:#a08870">' + rel.pillar + rel.zhi + '</span> <span style="color:' + clr + ';font-weight:500">' + rel.relation + '</span></span>';
        }).join('') +
        '</div></div></div>';
    }

    function buildFlowMiniCards(label, idx, gan, zhi, wxG, wxZ, nayin, shiShen, changSheng, riGan, desc, sub) {
      const bg = WU_XING_COLOR[wxG] || '#888';
      return '<div class="flow-detail-content"><div class="flow-detail-item"><div class="fd-label">' + label + '干支</div><div class="fd-value" style="color:' + bg + ';font-size:1rem">' + gan + zhi + '</div><div style="color:#a08870;font-size:0.72rem">' + desc + '</div></div>' +
        '<div class="flow-detail-item"><div class="fd-label">五行纳音</div><div class="fd-value">' + wxG + wxZ + '</div><div style="color:#a08870;font-size:0.72rem">' + nayin + '</div></div>' +
        '<div class="flow-detail-item"><div class="fd-label">对日主十神</div><div class="fd-value">' + shiShen + '</div><div style="color:#a08870;font-size:0.72rem">日主' + riGan + '遇' + gan + '</div></div>' +
        '<div class="flow-detail-item"><div class="fd-label">十二长生</div><div class="fd-value">' + changSheng + '</div><div style="color:#a08870;font-size:0.72rem">日主' + riGan + '遇' + zhi + '</div></div></div>';

    function buildShenshaChips(gan, zhi, extraSha) {
      const ss = calcSimpleShensha(gan, zhi);
      mergeObj(ss, extraSha || {});
      return Object.entries(ss).map(([n, v]) => {
        const vs = Array.isArray(v) ? v.join('、') : v;
        return '<span class="fd-chip"><span style="color:#a08870">' + n + '</span> <span style="color:#d4af37;font-weight:500">' + vs + '</span></span>';
      }).join('');
    }

    function updateShensha(gan, zhi, extraSha) {
      const ss = calcSimpleShensha(gan, zhi);
      mergeObj(ss, extraSha || {});
      buildShensha(ss);
    }

    function updateShenshaFromGanZhi(gan, zhi) {
      const ss = calcSimpleShensha(gan, zhi);
      buildShensha(ss);
    }

    // ═══════════════════════════════════════════
    //  AI 智能解盘
    // ═══════════════════════════════════════════

    const AI_STORAGE_KEY = 'bazi_ai_config';

    function loadAIConfig() {
      try {
        const raw = localStorage.getItem(AI_STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (_) {}
      return { key: '', endpoint: 'https://openrouter.ai/api/v1/chat/completions', model: 'google/gemini-2.0-flash-exp:free' };
    }

    function saveAIConfig() {
      const cfg = {
        key: document.getElementById('aiApiKey').value.trim(),
        endpoint: document.getElementById('aiEndpoint').value,
        model: document.getElementById('aiModel').value.trim()
      };
      localStorage.setItem(AI_STORAGE_KEY, JSON.stringify(cfg));
      const btn = document.getElementById('aiSaveKeyBtn');
      btn.textContent = '已保存 ✓';
      btn.style.borderColor = '#81c784';
      btn.style.color = '#81c784';
      setTimeout(() => { btn.textContent = '保存配置'; btn.style.borderColor = ''; btn.style.color = ''; }, 2000);
    }

    (function initAI() {
      const cfg = loadAIConfig();
      document.getElementById('aiApiKey').value = cfg.key;
      document.getElementById('aiEndpoint').value = cfg.endpoint;
      document.getElementById('aiModel').value = cfg.model;
    })();

    document.getElementById('aiSaveKeyBtn').addEventListener('click', saveAIConfig);

    document.getElementById('aiAnalyzeBtn').addEventListener('click', function() {
      if (!lastResult) {
        document.getElementById('baziForm').requestSubmit();
        return;
      }
      startAIAnalysis();
    });

    let aiAbortController = null;

    async function startAIAnalysis() {
      const cfg = loadAIConfig();
      const keyInput = document.getElementById('aiApiKey').value.trim();
      if (!keyInput && !cfg.key) {
        showAIError('请先输入 API Key');
        return;
      }
      const apiKey = keyInput || cfg.key;
      const endpoint = document.getElementById('aiEndpoint').value;
      const model = document.getElementById('aiModel').value.trim() || cfg.model;

      const r = lastResult;
      const prompt = buildAIPrompt(r);

      document.getElementById('aiResult').style.display = 'none';
      document.getElementById('aiResultInner').innerHTML = '';
      document.getElementById('aiStatus').style.display = 'block';
      document.getElementById('aiStatusText').textContent = 'AI 正在分析···';
      document.getElementById('aiCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      if (aiAbortController) aiAbortController.abort();
      aiAbortController = new AbortController();

      try {
        let fullText = '';
        const streamOk = await callAIStream(apiKey, endpoint, model, prompt, (chunk) => {
          fullText += chunk;
          document.getElementById('aiStatusText').textContent = 'AI 思考中··· (' + fullText.length + '字)';
        }, aiAbortController.signal);

        if (!streamOk || !fullText.trim()) {
          // Try non-streaming fallback
          fullText = await callAINonStream(apiKey, endpoint, model, prompt, aiAbortController.signal);
        }

        document.getElementById('aiStatus').style.display = 'none';
        document.getElementById('aiResult').style.display = 'block';
        renderAIResult(fullText);
      } catch (err) {
        if (err.name === 'AbortError') return;
        document.getElementById('aiStatus').style.display = 'none';
        showAIError('请求失败: ' + err.message);
      }
    }

    function showAIError(msg) {
      document.getElementById('aiResult').style.display = 'block';
      document.getElementById('aiResultInner').innerHTML = '<div class="ai-error">' + escapeHtml(msg) + '</div>';
      document.getElementById('aiCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function buildAIPrompt(r) {
      const now = new Date();
      const curYear = now.getFullYear();
      const curMonth = now.getMonth() + 1;
      const curDay = now.getDate();
      const curHour = now.getHours();
      const curMinute = now.getMinutes();
      const curHB = getHourBranchIdx(curHour, curMinute);
      const curDP = calcDayPillar(curYear, curMonth, curDay);
      const curHP = calcHourPillar(curDP.stemIdx, curHour, curMinute);
      const curNY = getNianZhiIndex(curYear, curMonth, curDay);
      const curNZ = DI_ZHI[curNY];
      const nZhi = DI_ZHI[getNianZhiIndex(
        parseInt(document.getElementById('birthYear').value),
        parseInt(document.getElementById('birthMonth').value),
        parseInt(document.getElementById('birthDay').value)
      )];
      const curLN = calcLiuNian(curYear, r.riGan, TIAN_GAN.indexOf(r.riGan), r.pillars, nZhi, r.pillars[1].zhi);

      let dayunText = '';
      r.daYun.pillars.forEach((p, i) => {
        dayunText += '\n    大运' + (i+1) + ': ' + p.gan + p.zhi + ' (' + p.wxG + p.wxZ + ' · ' + p.naYin + ')  ' + p.ageFrom + '-' + p.ageTo + '岁';
      });

      let cangText = '';
      r.pillars.forEach((p, i) => {
        const cg = r.cangGan[i];
        if (cg.length) cangText += '\n    ' + p.name + '藏干: ' + cg.join('、');
      });

      let ssZhiText = '';
      r.pillars.forEach((p, i) => {
        const sz = r.shiShenZhi[i];
        if (sz && sz.length) {
          ssZhiText += '\n    ' + p.name + '藏干十神: ' + sz.join('、');
        }
      });

      return [
        '## 八字命盘信息',
        '',
        '### 基本信息',
        '出生: ' + document.getElementById('birthYear').value + '年' + document.getElementById('birthMonth').value + '月' + document.getElementById('birthDay').value + '日 ' +
          SHI_CHEN[parseInt(document.getElementById('birthHour').value)] + ' 性别: ' + r.gender,
        '',
        '### 四柱',
        r.pillars.map((p, i) =>
          '  柱: ' + p.gan + p.zhi +
          '  五行: ' + WU_XING_TG[p.gan] + WU_XING_DZ[p.zhi] +
          '  纳音: ' + r.nayin[i] +
          '  十神: ' + r.shiShen[i] +
          '  十二长生: ' + r.changSheng[i] +
          '  阴阳: ' + r.yinyang[i].gan + r.yinyang[i].zhi
        ).join('\n'),
        cangText,
        ssZhiText,
        '',
        '### 日主',
        '日干: ' + r.riGan + ' (' + r.riWx + ' · ' + r.riYinYang + ')',
        '日支: ' + r.riZhi + '  藏干: ' + r.cangGan[2].join('、'),
        '',
        '### 五行分布',
        Object.entries(r.wuxingCount).map(([k, v]) => '  ' + k + ': ' + v + ' (' + r.wuxingPercent[k] + '%)').join('\n'),
        '缺: ' + (r.missingWx.length ? r.missingWx.join('、') : '无') + '  旺: ' + (r.maxWx.length ? r.maxWx[0][0] : ''),
        '',
        '### 神煞',
        Object.entries(r.shenSha).map(([k, v]) => '  ' + k + ': ' + (Array.isArray(v) ? v.join('、') : v)).join('\n') || '  无显著神煞',
        '',
        '### 大运',
        '起运: ' + r.daYun.startAge + '岁  排法: ' + (r.daYun.shunPai ? '顺排' : '逆排'),
        dayunText,
        '',
        '### 当前流年 (' + curYear + '年)',
        '干支: ' + curLN.gan + curLN.zhi + '  五行: ' + curLN.wxG + curLN.wxZ + '  纳音: ' + curLN.naYin,
        '生肖: ' + curLN.shengXiao + '年',
        '对日主十神: ' + curLN.shiShen + '  十二长生: ' + curLN.changSheng,
        '流年神煞: ' + Object.entries(curLN.shenSha).map(([k, v]) => k + '(' + (Array.isArray(v) ? v.join('、') : v) + ')').join('、'),
        '与四柱关系: ' + (curLN.relations || []).map(r => r.pillar + r.zhi + '-' + r.relation).join('、'),
        '',
        '### 当前时间',
        '公历: ' + curYear + '-' + curMonth + '-' + curDay + ' ' + curHour + ':' + (curMinute < 10 ? '0' : '') + curMinute,
        '日柱: ' + curDP.stem + curDP.branch + '  时柱: ' + curHP.stem + curHP.branch
      ].join('\n');
    }

    // ── Streaming API ──
    async function callAIStream(apiKey, endpoint, model, prompt, onChunk, signal) {
      const systemPrompt = '你是一位精通中国传统命理学的八字命理师。请严格按以下步骤分析用户提供的八字命盘：\n\n' +
        '1. **十神力量分析**：先确定各个十神的力量对比（考虑天干通根、地支藏干、月令旺衰、十二长生状态），所处位置（年/月/日/时柱），以及能够发挥作用的程度。\n\n' +
        '2. **格局判断**：根据十神组合确定格局是否能成立（正格/变格/从格等），如有多种可能的格局，分别评估成立概率。\n\n' +
        '3. **做功方式分析**：列出原局所有可能的做功方式（如官印相生、食神生财、杀印相生、比劫夺财等），分别评估每种做功方式的成立概率（列出概率百分比），选出最可信的做功方式。\n\n' +
        '4. **喜用神确定**：根据选定做功方式确定喜用神（喜什么五行、十神），忌神是什么。\n\n' +
        '5. **大运流年分析**：按照上述步骤重新评估最优做功方式，再论各步大运的喜忌吉凶。当前流年对原局的影响。\n\n' +
        '6. **格局层次评估**：通过做功的效率和纯粹情况评估命局的整体层次（上等/中等/下等格局）。\n\n' +
        '请用中文输出，使用Markdown格式，每个步骤用标题分隔（一、二、三、四、五、六）。语言专业但易懂，避免过于绝对的判断。';

      try {
        const resp = await fetch(endpoint, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + apiKey
          },
          body: JSON.stringify({
            model: model,
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: prompt }
            ],
            stream: true,
            temperature: 0.7,
            max_tokens: 4096
          }),
          signal: signal
        });

        if (!resp.ok) {
          const errText = await resp.text().catch(() => '');
          throw new Error('HTTP ' + resp.status + (errText ? ': ' + errText.slice(0, 200) : ''));
        }

        if (!resp.body) return false;

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let hasContent = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data: ')) continue;
            const data = trimmed.slice(6);
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              const content = parsed.choices?.[0]?.delta?.content || parsed.choices?.[0]?.text || '';
              if (content) {
                onChunk(content);
                hasContent = true;
              }
            } catch (_) { /* skip parse errors */ }
          }
        }

        return hasContent;
      } catch (err) {
        if (err.name === 'AbortError') throw err;
        return false; // fallback to non-stream
      }
    }

    // ── Non-Streaming Fallback ──
    async function callAINonStream(apiKey, endpoint, model, prompt, signal) {
      const systemPrompt = '你是一位精通中国传统命理学的八字命理师。请严格按以下步骤分析用户提供的八字命盘：\n\n' +
        '1. **十神力量分析**：先确定各个十神的力量对比（考虑天干通根、地支藏干、月令旺衰、十二长生状态），所处位置（年/月/日/时柱），以及能够发挥作用的程度。\n\n' +
        '2. **格局判断**：根据十神组合确定格局是否能成立（正格/变格/从格等），如有多种可能的格局，分别评估成立概率。\n\n' +
        '3. **做功方式分析**：列出原局所有可能的做功方式（如官印相生、食神生财、杀印相生、比劫夺财等），分别评估每种做功方式的成立概率（列出概率百分比），选出最可信的做功方式。\n\n' +
        '4. **喜用神确定**：根据选定做功方式确定喜用神（喜什么五行、十神），忌神是什么。\n\n' +
        '5. **大运流年分析**：按照上述步骤重新评估最优做功方式，再论各步大运的喜忌吉凶。当前流年对原局的影响。\n\n' +
        '6. **格局层次评估**：通过做功的效率和纯粹情况评估命局的整体层次（上等/中等/下等格局）。\n\n' +
        '请用中文输出，使用Markdown格式，每个步骤用标题分隔（一、二、三、四、五、六）。语言专业但易懂，避免过于绝对的判断。';

      const resp = await fetch(endpoint, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: model,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: prompt }
          ],
          stream: false,
          temperature: 0.7,
          max_tokens: 4096
        }),
        signal: signal
      });

      if (!resp.ok) {
        const errText = await resp.text().catch(() => '');
        throw new Error('HTTP ' + resp.status + (errText ? ': ' + errText.slice(0, 200) : ''));
      }

      const json = await resp.json();
      return json.choices?.[0]?.message?.content || json.choices?.[0]?.text || '';
    }

    // ── Render ──
    function renderAIResult(text) {
      // Lightweight Markdown → HTML
      let html = text
        .replace(/^#### (.+)$/gm, '<h5>$1</h5>')
        .replace(/^### (.+)$/gm, '<h5>$1</h5>')
        .replace(/^## (.+)$/gm, '<h4>$1</h4>')
        .replace(/^# (.+)$/gm, '<h4>$1</h4>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');

      html = '<p>' + html + '</p>';
      html = html.replace(/<p><\/p>/g, '').replace(/<br><\/li>/g, '</li>').replace(/<\/ul><br>/g, '</ul>').replace(/<br><ul>/g, '<ul>');

      document.getElementById('aiResultInner').innerHTML = html;
    }
  </script>
